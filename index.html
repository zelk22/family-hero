<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hero 🌟 V8.7.5 - Fast Polish</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #6c5ce7; --success: #2ecc71; --special: #e84393;
            --coop: #00cec9; --loot: #f1c40f; --accent: #fdcb6e;
            --bg: #f8f9fa; --danger: #ff7675; --streak: #ff9f43;
        }

        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; direction: rtl; }
        .container { max-width: 1100px; margin: 0 auto; }

        .children-nav { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .child-tab { background: white; padding: 10px 20px; border-radius: 15px; cursor: pointer; border: 2px solid #eee; font-weight: bold; white-space: nowrap; }
        .child-tab.active { border-color: var(--primary); background: var(--primary); color: white; }

        .coop-section { background: white; border-radius: 20px; padding: 15px; border-right: 8px solid var(--coop); box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin: 10px 0 20px 0; }

        .stats-card {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: white; padding: 25px; border-radius: 25px; margin: 10px 0; text-align: center; position: relative;
        }
        .treasure-box { font-size: 3.5rem; font-weight: 900; }

        .list-item { background: white; border-radius: 15px; padding: 12px; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: center; transition: 0.3s; border-right: 5px solid transparent; }
        .list-item.completed { background-color: #e8f8f0; border-right-color: var(--success); }
        .list-item.completed b { text-decoration: line-through; opacity: 0.6; color: #27ae60; }
        
        .btn-v { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--success); background: white; color: var(--success); cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .btn-v.done { background: var(--success); color: white; border: none; }
        
        .btn-action { background: var(--accent); border: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-show-more { background: none; border: 1px solid #ddd; color: #888; padding: 8px; width: 100%; border-radius: 10px; cursor: pointer; margin-top: 5px; font-weight: bold; }

        .bar-bg { width: 100%; height: 12px; background: #eee; border-radius: 10px; margin: 8px 0; overflow: hidden; }
        .bar-fill { height: 100%; transition: 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); width: 0%; }

        .accordion { background: #eee; padding: 15px; width: 100%; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .panel { display: none; padding: 15px; background: white; border: 1px solid #eee; border-radius: 12px; margin-bottom: 15px; }
        .sub-accordion { background: #f9f9f9; padding: 12px; width: 100%; border: 1px solid #f0f0f0; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 5px; text-align: right; display: block; }
        .sub-panel { display: none; padding: 10px; border: 1px solid #f0f0f0; margin-bottom: 10px; border-radius: 10px; }

        .manage-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; border-bottom: 1px solid #f0f0f0; align-items: center; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .input-edit { padding: 5px; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; padding: 10px;">
        <h1 style="color: var(--primary); margin: 0;">Family Hero 🌟</h1>
        <div id="dateDisplay" style="color: #888; font-size: 0.9rem;"></div>
    </header>

    <div id="childrenNav" class="children-nav"></div>
    <div id="coopArea"></div>

    <div class="stats-card">
        <span style="font-size: 1rem; opacity: 0.9;">💰 תיבת האוצר של <span id="activeNameDisplay">...</span></span>
        <div id="activePoints" class="treasure-box">0</div>
        <div class="progress-wrapper" style="background:rgba(255,255,255,0.2); height:12px; border-radius:10px; margin:15px 0; overflow:hidden;"><div id="mainBar" class="bar-fill" style="background:var(--accent);"></div></div>
        <small id="nextGoalText" style="font-weight: bold;"></small>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;" class="main-grid">
        <div class="section" style="border-top: 4px solid var(--primary); background: white; padding: 15px; border-radius: 20px;">
            <h2 style="color: var(--primary); margin-top: 0;">📅 משימות יומיות</h2>
            <div id="tasksList"></div>
            <button id="btnMoreTasks" class="btn-show-more" onclick="toggleExpand('tasks')">הצג עוד ▼</button>
            
            <h3 style="color: var(--special); margin-top: 30px; border-top: 2px solid #f0f0f0; padding-top: 15px;">🔥 פרויקטים מיוחדים</h3>
            <div id="questsList"></div>
        </div>

        <div class="section" style="border-top: 4px solid var(--loot); background: white; padding: 15px; border-radius: 20px;">
            <h2 style="color: var(--loot); margin-top: 0;">💎 חנות הפרסים</h2>
            <div id="rewardsList"></div>
            <button id="btnMoreRewards" class="btn-show-more" onclick="toggleExpand('rewards')">הצג עוד ▼</button>
        </div>
    </div>

    <div class="admin-box" style="margin-top: 30px;">
        <button class="accordion" onclick="toggleAcc(this)">➕ הוספת תוכן / אתגר <span>▼</span></button>
        <div class="panel">
            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
                <div style="flex:1"><label>סוג</label><select id="addType" onchange="updateFormFields()"><option value="task">משימה</option><option value="reward">פרס</option><option value="quest">פרויקט מיוחד</option><option value="coop">🤝 אתגר משפחתי</option></select></div>
                <div style="flex:2"><label>שם הפריט</label><input type="text" id="addName" placeholder="לדוגמה: סידור החדר"></div>
                <div style="flex:1"><label id="valLabel">ניקוד/שלבים</label>
                    <select id="addDiff"><option value="2">קל (2)</option><option value="10">בינוני (10)</option><option value="30">קשה (30)</option></select>
                    <input type="number" id="addNum" style="display:none;" value="10">
                </div>
                <button class="btn-action" style="background:var(--success); color:white; height:40px;" onclick="addNewContent()">שמור</button>
            </div>
        </div>

        <button class="accordion" onclick="toggleAcc(this)">⚙️ ניהול מערכת <span>▼</span></button>
        <div class="panel">
            <button class="sub-accordion" onclick="toggleSub(this)">📝 עריכת משימות <span>▼</span></button>
            <div class="sub-panel" id="manageTasks"></div>

            <button class="sub-accordion" onclick="toggleSub(this)">🎁 עריכת פרסים <span>▼</span></button>
            <div class="sub-panel" id="manageRewards"></div>

            <button class="sub-accordion" onclick="toggleSub(this)">🔥 עריכת פרויקטים מיוחדים <span>▼</span></button>
            <div class="sub-panel" id="manageQuests"></div>

            <button class="sub-accordion" onclick="toggleSub(this)">🤝 עריכת אתגרים משפחתיים <span>▼</span></button>
            <div class="sub-panel" id="manageCoops"></div>

            <button class="sub-accordion" onclick="toggleSub(this)">👶 שמות ילדים <span>▼</span></button>
            <div class="sub-panel" id="manageChildren"></div>

            <button class="sub-accordion" onclick="toggleSub(this)">⏰ איפוס יומי <span>▼</span></button>
            <div class="sub-panel"><button class="btn-show-more" style="color:red; border-color:red" onclick="manualReset()">איפוס סימוני V (הניקוד יישמר)</button></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD-JrKHwexfIk-fPPvpMcxGSvXwYp9OUkw",
        authDomain: "family-hero-3a3fd.firebaseapp.com",
        projectId: "family-hero-3a3fd",
        storageBucket: "family-hero-3a3fd.firebasestorage.app",
        messagingSenderId: "882400699018",
        appId: "1:882400699018:web:08af27dde50e387ea10373"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("data").doc("v875_main_state");

    let config = { tasksLimit: 5, rewardsLimit: 5, expandedTasks: false, expandedRewards: false };

    let state = {
        activeChild: 0,
        children: [{id:1, name:"ילד 1", pts:0}, {id:2, name:"ילד 2", pts:0}, {id:3, name:"ילד 3", pts:0}, {id:4, name:"ילד 4", pts:0}],
        tasks: [
            {id:1, name:"צחצוח שיניים", val:2, verify:'none'}, {id:2, name:"סידור מיטה", val:2, verify:'none'}, {id:3, name:"שיעורי בית", val:10, verify:'none'}, {id:4, name:"מקלחת בזמן", val:10, verify:'none'},
            {id:5, name:"עריכת שולחן", val:5, verify:'none'}, {id:6, name:"סידור תיק", val:5, verify:'none'}, {id:7, name:"איסוף משחקים", val:5, verify:'none'}, {id:8, name:"קריאה", val:10, verify:'none'}
        ],
        rewards: [
            {id:101, name:"ממתק קטן", val:30}, {id:102, name:"30 דק' מסך", val:100}, {id:103, name:"תיבת הפתעה", val:150}
        ],
        quests: [{id:201, name:"חוברת עבודה", steps:10, current:0, val:100}],
        coops: [],
        dailyDone: {}
    };

    function save() { docRef.set(state); }

    docRef.onSnapshot((doc) => {
        if (doc.exists()) { 
            state = {...state, ...doc.data()}; 
            render(); 
        } else { save(); }
    });

    function toggleAcc(el) { const p = el.nextElementSibling; p.style.display = p.style.display === "block" ? "none" : "block"; }
    function toggleSub(el) { const p = el.nextElementSibling; p.style.display = p.style.display === "block" ? "none" : "block"; }
    function toggleExpand(type) { if(type==='tasks') config.expandedTasks=!config.expandedTasks; if(type==='rewards') config.expandedRewards=!config.expandedRewards; render(); }

    function updateFormFields() {
        const type = document.getElementById('addType').value;
        document.getElementById('addDiff').style.display = (type === 'task') ? 'block' : 'none';
        document.getElementById('addNum').style.display = (type !== 'task') ? 'block' : 'none';
    }

    function addNewContent() {
        const type = document.getElementById('addType').value;
        const name = document.getElementById('addName').value;
        if(!name) return;
        const val = (type === 'task') ? parseInt(document.getElementById('addDiff').value) : parseInt(document.getElementById('addNum').value);
        if(type === 'task') state.tasks.push({id:Date.now(), name, val, verify:'none'});
        else if(type === 'reward') state.rewards.push({id:Date.now(), name, val});
        else if(type === 'quest') state.quests.push({id:Date.now(), name, steps:val, current:0, val:100});
        else if(type === 'coop') state.coops.push({id:Date.now(), name, goal:val});
        render(); // תגובה מיידית
        save();
    }

    function advanceQuest(qId) {
        const q = state.quests.find(x => x.id === qId);
        if (q.current < q.steps) {
            q.current++;
            if (q.current >= q.steps) {
                state.children[state.activeChild].pts += q.val;
                q.current = 0;
                alert(`כל הכבוד! פרויקט "${q.name}" הושלם!`);
            }
            render(); // תגובה מיידית
            save();
        }
    }

    function toggleTask(tId, val) {
        const cId = state.children[state.activeChild].id;
        if(!state.dailyDone[cId]) state.dailyDone[cId] = [];
        const idx = state.dailyDone[cId].indexOf(tId);
        if(idx === -1) {
            state.dailyDone[cId].push(tId);
            state.children[state.activeChild].pts += val;
        } else {
            state.dailyDone[cId].splice(idx, 1);
            state.children[state.activeChild].pts -= val;
        }
        render(); // צביעת ה-V והנקודות מיידית
        save();
    }

    function manualReset() { 
        if(confirm('לאפס סימוני V?')) { 
            state.dailyDone = {}; 
            render();
            save(); 
        } 
    }

    function render() {
        const child = state.children[state.activeChild];
        const doneList = state.dailyDone[child.id] || [];
        const totalFamilyPoints = state.children.reduce((s, c) => s + (c.pts || 0), 0);

        document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('he-IL', { weekday:'long', day:'numeric', month:'long' });
        document.getElementById('activePoints').innerText = child.pts;
        document.getElementById('activeNameDisplay').innerText = child.name;

        document.getElementById('childrenNav').innerHTML = state.children.map((c, idx) => `
            <div class="child-tab ${idx===state.activeChild?'active':''}" onclick="state.activeChild=${idx}; render();">${c.name}</div>`).join('');

        const coopArea = document.getElementById('coopArea');
        if(state.coops && state.coops.length > 0) {
            coopArea.innerHTML = `<div class="coop-section"><h3 style="margin:0 0 10px 0; color:var(--coop); font-size:1.1rem;">🤝 אתגר קבוצתי משפחתי</h3>
                ${state.coops.map(c => `<div style="margin-bottom:10px;"><div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.9rem;"><span>${c.name}</span> <span>${totalFamilyPoints} / ${c.goal}</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width:${Math.min((totalFamilyPoints/c.goal)*100, 100)}%; background:var(--coop)"></div></div></div>`).join('')}</div>`;
        } else { coopArea.innerHTML = ''; }

        const vTasks = config.expandedTasks ? state.tasks : state.tasks.slice(0, config.tasksLimit);
        document.getElementById('tasksList').innerHTML = vTasks.map(t => {
            const isDone = doneList.includes(t.id);
            return `<div class="list-item ${isDone?'completed':''}"><div><b>${t.name}</b><br><small>+${t.val} נק'</small></div>
                <button class="btn-v ${isDone?'done':''}" onclick="toggleTask(${t.id}, ${t.val})">✓</button></div>`;
        }).join('');
        document.getElementById('btnMoreTasks').innerText = config.expandedTasks ? "הצג פחות ▲" : "הצג עוד ▼";

        document.getElementById('questsList').innerHTML = state.quests.map(q => `
            <div class="list-item" style="flex-direction:column; align-items:start;">
                <div style="width:100%; display:flex; justify-content:space-between;"><b>${q.name}</b> <span>${q.current}/${q.steps}</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width:${(q.current/q.steps)*100}%; background:var(--special)"></div></div>
                <button class="btn-action" style="font-size:0.75rem; width:100%;" onclick="advanceQuest(${q.id})" ${q.current >= q.steps ? 'disabled' : ''}>+ התקדמות</button>
            </div>`).join('');

        const vRewards = config.expandedRewards ? state.rewards : state.rewards.slice(0, config.rewardsLimit);
        document.getElementById('rewardsList').innerHTML = vRewards.map(r => `
            <div class="list-item"><div><b>${r.name}</b><br><small>${r.val} 💎</small></div>
                <button class="btn-action" onclick="if(child.pts>=${r.val}){child.pts-=${r.val}; alert('פדית!'); render(); save();}else{alert('חסר!');}">פדה</button></div>`).join('');
        document.getElementById('btnMoreRewards').innerText = config.expandedRewards ? "הצג פחות ▲" : "הצג עוד ▼";

        // עדכון מערכת ניהול - תוכן נשאר זהה
        document.getElementById('manageTasks').innerHTML = state.tasks.map(t => `
            <div class="manage-row"><input class="input-edit" style="flex:2" value="${t.name}" onchange="state.tasks.find(x=>x.id==${t.id}).name=this.value; render(); save();">
                <input type="number" class="input-edit" style="width:45px" value="${t.val}" onchange="state.tasks.find(x=>x.id==${t.id}).val=parseInt(this.value); render(); save();">
                <button class="btn-del" onclick="state.tasks=state.tasks.filter(x=>x.id!==${t.id}); render(); save();">🗑️</button></div>`).join('');

        document.getElementById('manageQuests').innerHTML = state.quests.map(q => `
            <div class="manage-row"><input class="input-edit" style="flex:2" value="${q.name}" onchange="state.quests.find(x=>x.id==${q.id}).name=this.value; render(); save();">
                <input type="number" class="input-edit" style="width:45px" value="${q.steps}" onchange="state.quests.find(x=>x.id==${q.id}).steps=parseInt(this.value); render(); save();">
                <button class="btn-del" onclick="state.quests=state.quests.filter(x=>x.id!==${q.id}); render(); save();">🗑️</button></div>`).join('');

        document.getElementById('manageRewards').innerHTML = state.rewards.map(r => `
            <div class="manage-row"><input class="input-edit" style="flex:2" value="${r.name}" onchange="state.rewards.find(x=>x.id==${r.id}).name=this.value; render(); save();">
                <input type="number" class="input-edit" style="width:60px" value="${r.val}" onchange="state.rewards.find(x=>x.id==${r.id}).val=parseInt(this.value); render(); save();">
                <button class="btn-del" onclick="state.rewards=state.rewards.filter(x=>x.id!==${r.id}); render(); save();">🗑️</button></div>`).join('');

        document.getElementById('manageChildren').innerHTML = state.children.map((c, i) => `
            <div class="manage-row"><input class="input-edit" style="width:100%" value="${c.name}" onchange="state.children[${i}].name=this.value; render(); save();"></div>`).join('');

        const nextR = state.rewards.filter(r => r.val > child.pts).sort((a,b)=>a.val-b.val)[0] || state.rewards[0];
        if(nextR) {
            document.getElementById('mainBar').style.width = Math.min((child.pts / nextR.val) * 100, 100) + "%";
            document.getElementById('nextGoalText').innerText = `המטרה: ${nextR.name} (${nextR.val} נק')`;
        }
    }
</script>
</body>
</html>

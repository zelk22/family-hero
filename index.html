<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hero 🌟 V8.7.5</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // ה-Config האישי שלך
        const firebaseConfig = {
            apiKey: "AIzaSyD-JrKHwexfIk-fPPvpMcxGSvXwYp9OUkw",
            authDomain: "family-hero-3a3fd.firebaseapp.com",
            projectId: "family-hero-3a3fd",
            storageBucket: "family-hero-3a3fd.firebasestorage.app",
            messagingSenderId: "882400699018",
            appId: "1:882400699018:web:08af27dde50e387ea10373"
        };

        // אתחול המערכת וחיבור ל-Firestore
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const docRef = db.collection("data").doc("v875_state");

        // נתוני ברירת המחדל של האפליקציה
        let state = {
            activeChild: 0,
            children: [
                {id:1, name:"ילד 1", pts:0}, {id:2, name:"ילד 2", pts:0}, 
                {id:3, name:"ילד 3", pts:0}, {id:4, name:"ילד 4", pts:0}
            ],
            tasks: [
                {id:1, name:"צחצוח שיניים", val:2}, {id:2, name:"סידור מיטה", val:2}, 
                {id:3, name:"שיעורי בית", val:10}, {id:4, name:"מקלחת בזמן", val:10},
                {id:5, name:"עריכת שולחן", val:5}, {id:6, name:"סידור תיק", val:5},
                {id:7, name:"איסוף משחקים", val:5}, {id:8, name:"קריאה", val:10}
            ],
            rewards: [
                {id:101, name:"ממתק קטן", val:30}, {id:102, name:"30 דק' מסך", val:100}, 
                {id:103, name:"תיבת הפתעה", val:150}, {id:104, name:"בחירת ארוחה", val:200},
                {id:106, name:"גלידה", val:500}, {id:110, name:"טיול לבחירה", val:1500}
            ],
            quests: [{id:201, name:"חוברת עבודה", steps:10, current:0, val:100}],
            dailyDone: {}
        };

        // פונקציית שמירה לענן
        function save() { docRef.set(state); }

        // האזנה לשינויים בזמן אמת מהענן
        docRef.onSnapshot((doc) => {
            if (doc.exists()) { state = doc.data(); render(); } 
            else { save(); }
        });

        // סימון משימה כבוצעה או ביטול
        function toggleTask(tId, val) {
            const childId = state.children[state.activeChild].id;
            if(!state.dailyDone[childId]) state.dailyDone[childId] = [];
            const idx = state.dailyDone[childId].indexOf(tId);
            if(idx === -1) { state.dailyDone[childId].push(tId); state.children[state.activeChild].pts += val; }
            else { state.dailyDone[childId].splice(idx, 1); state.children[state.activeChild].pts -= val; }
            save();
        }

        // התקדמות בפרויקט (Quest)
        function advanceQuest(qId) {
            const q = state.quests.find(x => x.id === qId);
            if(q.current < q.steps) {
                q.current++;
                if(q.current >= q.steps) { 
                    alert("פרויקט הושלם!"); 
                    state.children[state.activeChild].pts += q.val;
                }
                save();
            }
        }

        // פדיון נקודות עבור פרס
        function redeem(val) {
            if(state.children[state.activeChild].pts >= val) {
                state.children[state.activeChild].pts -= val;
                save();
            } else { alert("אין לך מספיק נקודות עדיין!"); }
        }

        // רינדור התצוגה (בניית ה-HTML מחדש)
        function render() {
            const child = state.children[state.activeChild];
            const doneList = state.dailyDone[child.id] || [];
            
            document.getElementById('tabs').innerHTML = state.children.map((c,i) => 
                `<div class="tab ${i===state.activeChild?'active':''}" onclick="state.activeChild=${i};render()">${c.name}</div>`).join('');

            document.getElementById('cName').innerText = child.name;
            document.getElementById('pts').innerText = child.pts;
            
            const nextR = state.rewards.find(r => r.val > child.pts) || state.rewards[state.rewards.length-1];
            document.getElementById('progressBar').style.width = Math.min((child.pts/nextR.val)*100, 100) + "%";
            document.getElementById('goalText').innerText = `היעד: ${nextR.name} (${nextR.val} נק')`;

            // משימות
            document.getElementById('tasksList').innerHTML = state.tasks.map(t => {
                const isDone = doneList.includes(t.id);
                return `<div class="item ${isDone?'done':''}"><span>${t.name} (+${t.val})</span>
                <button class="btn-v ${isDone?'active':''}" onclick="toggleTask(${t.id},${t.val})">${isDone?'✅':'V'}</button></div>`;
            }).join('');

            // פרויקטים
            document.getElementById('questsList').innerHTML = state.quests.map(q => `
                <div class="item" style="flex-direction:column; align-items:start;">
                    <div style="width:100%; display:flex; justify-content:space-between;"><b>${q.name}</b> <span>${q.current}/${q.steps}</span></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${(q.current/q.steps)*100}%; background:#e84393"></div></div>
                    <button class="btn-action" onclick="advanceQuest(${q.id})">התקדמות</button>
                </div>`).join('');

            // פרסים
            document.getElementById('rewardsList').innerHTML = state.rewards.map(r => `
                <div class="item"><span>${r.name} (${r.val})</span>
                <button class="btn-action" onclick="redeem(${r.val})">פדה</button></div>`).join('');
        }
    </script>

    <style>
        :root { --p: #6c5ce7; --bg: #f8f9fa; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); direction: rtl; padding: 20px; margin: 0; }
        .card { background: white; max-width: 500px; margin: auto; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; }
        .tab { background: #eee; padding: 10px 20px; border-radius: 15px; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .tab.active { background: var(--p); color: white; }
        .stats { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: white; padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .item { background: white; border: 1px solid #eee; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .item.done { background: #e8f8f0; border-color: #2ecc71; }
        .bar-bg { width: 100%; height: 10px; background: #eee; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; background: #fdcb6e; transition: 0.5s; width: 0%; }
        .btn-v { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--p); background: white; cursor: pointer; font-weight: bold; }
        .btn-v.active { background: #2ecc71; border-color: #2ecc71; color: white; }
        .btn-action { background: #fdcb6e; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        h3 { color: var(--p); margin-top: 25px; }
    </style>
</head>
<body onload="render()">
    <div class="card">
        <div id="tabs" class="tabs"></div>
        <div class="stats">
            <h2 id="cName">...</h2>
            <div id="pts" style="font-size: 3.5rem; font-weight: 900;">0</div>
            <div class="bar-bg"><div id="progressBar" class="bar-fill"></div></div>
            <small id="goalText"></small>
        </div>
        
        <h3>🎯 משימות</h3>
        <div id="tasksList"></div>
        
        <h3>🔥 פרויקטים</h3>
        <div id="questsList"></div>
        
        <h3>💎 פרסים</h3>
        <div id="rewardsList"></div>
        
        <button onclick="if(confirm('לאפס משימות יומיות?')){state.dailyDone={};save();}" style="width:100%; background:none; border:none; color:#bbb; margin-top:25px; cursor:pointer; font-size: 0.9rem;">איפוס יומי</button>
    </div>
</body>
</html>

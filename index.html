<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Family Hero 🌟 V13.3</title>
   <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
   
   <style>
       :root {
           --primary: #6c5ce7; --success: #2ecc71; --special: #e84393;
           --coop: #00cec9; --loot: #f1c40f; --accent: #fdcb6e;
           --bg: #f8f9fa; --text: #2d3436; --danger: #ff7675;
           --child-color: #6c5ce7;
       }
       
       body.dark-mode { --bg: #2d3436; --text: #dfe6e9; --primary: #a29bfe; }
       body.dark-mode .list-item, body.dark-mode .child-tab:not(.active), body.dark-mode .stats-card { 
           background: #353b48; color: white; border-color: #4b4b4b; 
       }
       
       /* תפריט ניהול - תמיד בהיר */
       #adminWrapper { 
           background: #ffffff; color: #2d3436 !important; padding: 15px; border-radius: 20px; 
           margin-top: 30px; border: 3px solid var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.1);
       }
       #adminWrapper * { color: #2d3436 !important; }
       #adminWrapper .accordion { background: #f1f2f6 !important; border: 1px solid #ddd !important; }

       body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; direction: rtl; transition: 0.5s; }
       .container { max-width: 1100px; margin: 0 auto; }
       
       /* ניווט ילדים משופר */
       .children-nav { display: flex; gap: 12px; overflow-x: auto; padding: 15px 0; justify-content: center; }
       .child-tab { 
           background: white; padding: 12px 25px; border-radius: 50px; cursor: pointer; 
           border: 2px solid #eee; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
       }
       .child-tab.active { 
           border-color: var(--child-color); background: var(--child-color); color: white !important; 
           transform: scale(1.1); box-shadow: 0 0 15px rgba(108, 92, 231, 0.4);
       }

       /* כרטיס תיבת אוצר */
       .stats-card { 
           background: linear-gradient(135deg, var(--child-color), #341f97); 
           color: white; padding: 30px; border-radius: 30px; margin: 15px 0; text-align: center; 
           transition: 0.5s; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
       }
       .treasure-box { font-size: 4rem; font-weight: 900; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); }
       
       .list-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 6px solid transparent; transition: 0.3s; }
       .list-item.completed { background-color: rgba(46, 204, 113, 0.1); border-right-color: var(--success); opacity: 0.8; }

       .wheel-btn { width: 100%; padding: 18px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin: 10px 0; font-size: 1.1rem; }
       .wheel-btn.unlocked { background: var(--special); color: white; animation: pulse 1.5s infinite; }
       @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.03);} 100% {transform: scale(1);} }

       .bar-bg { width: 100%; height: 14px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 10px 0; overflow: hidden; }
       .bar-fill { height: 100%; background: var(--accent); transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

       .accordion { width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
       .panel { display: none; padding: 15px; }
       .manage-row { display: flex; gap: 8px; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
       .btn-v { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--success); background: none; color: var(--success); cursor: pointer; font-size: 1.3rem; }
       .btn-v.done { background: var(--success); color: white; }
   </style>
</head>
<body id="mainBody">

<div class="container">
   <header style="text-align: center; margin-bottom: 10px;">
       <h1 style="margin: 0; color: var(--primary); font-size: 2.2rem;">Family Hero 🌟</h1>
       <div id="dateDisplay" style="opacity: 0.8; font-weight: bold;"></div>
   </header>

   <div id="childrenNav" class="children-nav"></div>
   
   <div id="coopArea"></div>

   <div class="stats-card" id="mainStatsCard">
       <span style="font-size: 1.3rem; opacity: 0.95; font-weight: bold;">💎 תיבת האוצר של <span id="activeNameDisplay">...</span></span>
       <div id="activePoints" class="treasure-box">0</div>
       <div class="bar-bg"><div id="mainBar" class="bar-fill" style="width: 0%;"></div></div>
       <small id="nextGoalText" style="font-weight: bold; font-size: 1rem;"></small>
   </div>

   <div class="wheel-area">
       <button id="dailyWheel" class="wheel-btn" onclick="spinWheel()">🎁 מתנת היום (נעול)</button>
       <div id="bonusProgressText" style="text-align:center; font-size: 0.9rem; font-weight: bold; color: var(--special);"></div>
   </div>

   <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;" class="main-grid">
       <div class="section">
           <h2 style="color: var(--primary);">📅 משימות היום</h2>
           <div id="tasksList"></div>
           <h3 style="color: var(--special); margin-top: 25px;">🔥 פרויקטים ארוכים</h3>
           <div id="questsList"></div>
       </div>
       <div class="section">
           <h2 style="color: var(--loot);">💎 פרסים שווים</h2>
           <div id="rewardsList"></div>
       </div>
   </div>

   <div id="adminWrapper" style="display:none;">
       <h2 style="margin:0; text-align:center; color: var(--primary) !important;">🛠️ מרכז ניהול הורים</h2>
       
       <button class="accordion" onclick="toggleAcc(this)">📋 ניהול משימות, פרסים ותוכן <span>▼</span></button>
       <div class="panel">
           <div style="background:#f1f2f6; padding:15px; border-radius:10px; margin-bottom:15px;">
               <h4 style="margin:0 0 10px 0;">➕ הוסף פריט חדש</h4>
               <div style="display:flex; gap:5px; flex-wrap:wrap;">
                   <select id="addType"><option value="task">משימה</option><option value="reward">פרס</option><option value="quest">פרויקט</option><option value="coop">אתגר משפחתי</option></select>
                   <input type="text" id="addName" placeholder="מה להוסיף?">
                   <input type="number" id="addVal" placeholder="שווי" style="width:60px;">
                   <button onclick="addItem()" style="background:var(--success); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">שמור</button>
               </div>
           </div>
           
           <div id="manageTasks"></div>
           <div id="manageQuests"></div>
           <div id="manageRewards"></div>
           <div id="manageCoops"></div>
       </div>

       <button class="accordion" onclick="toggleAcc(this)">👶 ניהול ילדים וניקוד ידני <span>▼</span></button>
       <div class="panel" id="manageChildren"></div>

       <button class="accordion" onclick="toggleAcc(this)">📸 צילומי הוכחה מהיום <span>▼</span></button>
       <div class="panel" id="proofViewer" style="display:flex; gap:10px; overflow-x:auto;">אין צילומים עדיין.</div>

       <button onclick="if(confirm('לאפס את כל המשימות להיום?')){state.dailyDone={};save();render();}" style="width:100%; padding:15px; margin-top:10px; background:var(--danger); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">⏰ איפוס יומי (ניקוי V)</button>
   </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handleImageUpload(event)">

<script>
   const firebaseConfig = {
       apiKey: "AIzaSyD-JrKHwexfIk-fPPvpMcxGSvXwYp9OUkw",
       authDomain: "family-hero-3a3fd.firebaseapp.com",
       projectId: "family-hero-3a3fd",
       storageBucket: "family-hero-3a3fd.firebasestorage.app",
       messagingSenderId: "882400699018",
       appId: "1:882400699018:web:08af27dde50e387ea10373"
   };
   firebase.initializeApp(firebaseConfig);
   const db = firebase.firestore();
   const docRef = db.collection("data").doc("v875_main_state");

   const urlParams = new URLSearchParams(window.location.search);
   const isAdmin = urlParams.get('admin') === 'true';
   const childIdParam = urlParams.get('child');
   
   // פלטת צבעים לילדים כדי שיהיה שינוי ויזואלי ברור
   const childColors = ["#6c5ce7", "#e84393", "#00cec9", "#f1c40f", "#ff7675"];

   let state = { activeChild:0, children:[], tasks:[], rewards:[], quests:[], coops:[], dailyDone:{}, proofs:{}, wheelClaims:{} };
   let isInitialLoad = true;
   let curTaskPhoto = null;

   function save() { if(!isInitialLoad) docRef.set(state); }

   docRef.onSnapshot(doc => {
       if(doc.exists) {
           state = doc.data();
           if(childIdParam) {
               const idx = state.children.findIndex(c => c.id == childIdParam);
               if(idx !== -1) state.activeChild = idx;
           }
       }
       isInitialLoad = false;
       checkMode();
       render();
   });

   function checkMode() {
       const h = new Date().getHours();
       document.getElementById('mainBody').classList.toggle('dark-mode', h>=19 || h<7);
   }

   function render() {
       if(!state.children || !state.children[state.activeChild]) return;
       const child = state.children[state.activeChild];
       const done = state.dailyDone[child.id] || [];
       const totalFamPts = (state.children||[]).reduce((a,b)=>a+(b.pts||0),0);
       
       // עדכון צבע נושא לפי הילד
       const themeColor = childColors[state.activeChild % childColors.length];
       document.documentElement.style.setProperty('--child-color', themeColor);

       document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});
       document.getElementById('activePoints').innerText = child.pts;
       document.getElementById('activeNameDisplay').innerText = child.name;

       // בונוס יומי
       const bonusBtn = document.getElementById('dailyWheel');
       const progressText = document.getElementById('bonusProgressText');
       const today = new Date().toDateString();
       const claimed = state.wheelClaims && state.wheelClaims[child.id] === today;
       
       if(claimed) {
           bonusBtn.className = "wheel-btn locked"; bonusBtn.innerText = "✅ קיבלת את המתנה היומית!"; progressText.innerText = "";
       } else if(done.length >= 7) {
           bonusBtn.className = "wheel-btn unlocked"; bonusBtn.innerText = "🌟 פתח את תיבת האוצר!"; progressText.innerText = "הגעת ל-7 משימות!";
       } else {
           bonusBtn.className = "wheel-btn locked"; bonusBtn.style.background = "#d1d8e0"; bonusBtn.innerText = "🎁 מתנת היום (נעול)"; progressText.innerText = `עוד ${7 - done.length} משימות לבונוס`;
       }

       if(isAdmin){
           document.getElementById('adminWrapper').style.display = 'block';
           document.getElementById('childrenNav').style.display = 'flex';
           document.getElementById('childrenNav').innerHTML = state.children.map((c,i)=>`
               <div class="child-tab ${i==state.activeChild?'active':''}" 
                    style="${i==state.activeChild?`--child-color:${childColors[i%childColors.length]}`:''}"
                    onclick="state.activeChild=${i};render();">${c.name}</div>`).join('');
           renderAdminPanels();
       }

       // רשימות
       document.getElementById('tasksList').innerHTML = (state.tasks||[]).map(t => {
           const isDone = done.includes(t.id);
           return `<div class="list-item ${isDone?'completed':''}">
               <div><b>${t.name}</b> <small>(+${t.val})</small></div>
               <div style="display:flex; gap:8px;">
                   ${t.needPhoto && !isDone ? `<button onclick="curTaskPhoto=${t.id};document.getElementById('cameraInput').click()" style="background:none;border:none;cursor:pointer;font-size:1.3rem;">📸</button>` : ''}
                   <button class="btn-v ${isDone?'done':''}" onclick="toggleTask(${t.id},${t.val}, event)">✓</button>
               </div>
           </div>`;
       }).join('');

       document.getElementById('questsList').innerHTML = (state.quests||[]).map(q => `
           <div class="list-item" style="flex-direction:column; align-items:start;">
               <div style="width:100%; display:flex; justify-content:space-between;"><b>${q.name}</b> <span>${q.current||0}/${q.steps}</span></div>
               <div class="bar-bg" style="background:rgba(0,0,0,0.1);"><div class="bar-fill" style="background:var(--special); width:${((q.current||0)/q.steps)*100}%"></div></div>
               <button onclick="advQuest(${q.id})" style="width:100%; background:none; border:1px solid #ddd; border-radius:8px; padding:5px; cursor:pointer; font-size:0.8rem;">עוד שלב +</button>
           </div>`).join('');

       document.getElementById('rewardsList').innerHTML = (state.rewards||[]).map(r => `
           <div class="list-item">
               <div><b>${r.name}</b> <br><small>${r.val} 💎</small></div>
               <button onclick="buy(${r.val})" style="background:var(--accent); border:none; padding:8px 15px; border-radius:20px; font-weight:bold; cursor:pointer;">פדה</button>
           </div>`).join('');

       document.getElementById('coopArea').innerHTML = (state.coops||[]).map(c => `
           <div style="background:white; color:#2d3436; padding:15px; border-radius:20px; border-right:8px solid var(--coop); margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.05);">
               <div style="display:flex; justify-content:space-between;"><b>🤝 ${c.name}</b> <span>${totalFamPts}/${c.goal}</span></div>
               <div class="bar-bg" style="background:rgba(0,0,0,0.05);"><div class="bar-fill" style="background:var(--coop); width:${Math.min((totalFamPts/c.goal)*100,100)}%"></div></div>
           </div>`).join('');

       const next = (state.rewards||[]).filter(r=>r.val > child.pts).sort((a,b)=>a.val-b.val)[0] || (state.rewards||[])[0];
       if(next){
           document.getElementById('mainBar').style.width = Math.min((child.pts/next.val)*100,100)+"%";
           document.getElementById('nextGoalText').innerText = `היעד הבא: ${next.name} (${next.val} נק')`;
       }
   }

   function renderAdminPanels() {
       document.getElementById('manageTasks').innerHTML = "<h4>משימות קיימות:</h4>" + state.tasks.map((t,i) => `
           <div class="manage-row">
               <input class="input-edit" value="${t.name}" onchange="state.tasks[${i}].name=this.value;save()">
               <input type="number" style="width:45px" value="${t.val}" onchange="state.tasks[${i}].val=parseInt(this.value);save()">
               <button onclick="state.tasks[${i}].needPhoto=!state.tasks[${i}].needPhoto;save();render();">${t.needPhoto?'📸':'📷'}</button>
               <button onclick="state.tasks.splice(${i},1);save();render()">🗑️</button>
           </div>`).join('');

       document.getElementById('manageRewards').innerHTML = "<h4>פרסים קיימים:</h4>" + state.rewards.map((r,i) => `
           <div class="manage-row">
               <input class="input-edit" value="${r.name}" onchange="state.rewards[${i}].name=this.value;save()">
               <input type="number" style="width:50px" value="${r.val}" onchange="state.rewards[${i}].val=parseInt(this.value);save()">
               <button onclick="state.rewards.splice(${i},1);save();render()">🗑️</button>
           </div>`).join('');

       document.getElementById('manageChildren').innerHTML = state.children.map((c,i) => `
           <div class="manage-row" style="background:#f9f9f9; border:1px solid #ddd; margin-bottom:10px; border-radius:10px; padding:15px; display:block;">
               <div style="display:flex; justify-content:space-between; align-items:center;">
                   <b style="font-size:1.1rem;">${c.name}</b> 
                   <span>💎 <input type="number" value="${c.pts}" onchange="state.children[${i}].pts=parseInt(this.value);save();render();" style="width:70px; padding:5px; border-radius:5px; border:1px solid #ccc;"></span>
               </div>
           </div>`).join('');
       
       const pKeys = Object.keys(state.proofs || {});
       document.getElementById('proofViewer').innerHTML = pKeys.length ? pKeys.map(k => `<div><img src="${state.proofs[k]}" style="width:80px;height:80px;object-fit:cover;border-radius:10px;" onclick="window.open(this.src)"><br><button onclick="delete state.proofs['${k}'];save();render()" style="font-size:0.7rem; width:100%;">מחק</button></div>`).join('') : "אין צילומים.";
   }

   function toggleTask(id, v, event) {
       const c = state.children[state.activeChild];
       if(!state.dailyDone[c.id]) state.dailyDone[c.id] = [];
       const idx = state.dailyDone[c.id].indexOf(id);
       if(idx===-1){ 
           state.dailyDone[c.id].push(id); c.pts+=v; 
           const rect = event.target.getBoundingClientRect();
           confetti({ particleCount: 100, spread: 70, origin: { x: (rect.left+rect.width/2)/window.innerWidth, y: (rect.top+rect.height/2)/window.innerHeight } });
       } else { 
           state.dailyDone[c.id].splice(idx,1); 
           c.pts = Math.max(0, c.pts - v); 
       }
       save(); render();
   }

   function buy(v) {
       const c = state.children[state.activeChild];
       if(c.pts>=v){ 
           if(confirm("לפדות פרס ולהפחית נקודות?")){
               c.pts = Math.max(0, c.pts - v);
               save(); render(); confetti({particleCount:150, spread:100});
           }
       } else alert("חסרות לך נקודות בתיבת האוצר!");
   }

   function addItem() {
       const t = document.getElementById('addType').value;
       const n = document.getElementById('addName').value;
       const v = parseInt(document.getElementById('addVal').value) || 0;
       if(!n) return;
       const item = {id:Date.now(), name:n};
       if(t=='task') { item.val=v; item.needPhoto=false; state.tasks.push(item); }
       else if(t=='reward') { item.val=v; state.rewards.push(item); }
       else if(t=='quest') { item.steps=v; item.current=0; state.quests.push(item); }
       else if(t=='coop') { item.goal=v; state.coops.push(item); }
       save(); render(); document.getElementById('addName').value='';
   }

   function spinWheel() {
       const child = state.children[state.activeChild];
       if((state.dailyDone[child.id] || []).length < 7) return;
       const bonus = Math.floor(Math.random()*15)+10;
       child.pts += bonus;
       if(!state.wheelClaims) state.wheelClaims = {};
       state.wheelClaims[child.id] = new Date().toDateString();
       confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
       alert(`תיבת האוצר נפתחה! זכית ב-${bonus} נקודות בונוס! 🎁`);
       save(); render();
   }

   function advQuest(id) {
       const q = state.quests.find(x=>x.id==id);
       if(q && (q.current||0) < q.steps) {
           q.current = (q.current||0) + 1;
           if(q.current >= q.steps) { state.children[state.activeChild].pts += 100; q.current = 0; alert("פרויקט הושלם! בונוס 100 נקודות!"); }
           save(); render();
       }
   }

   function handleImageUpload(e) {
       const reader = new FileReader();
       reader.onload = function(event) {
           if(!state.proofs) state.proofs = {};
           state.proofs[state.children[state.activeChild].id + "_" + curTaskPhoto] = event.target.result;
           save(); render();
       };
       reader.readAsDataURL(e.target.files[0]);
   }

   function toggleAcc(el) { const p = el.nextElementSibling; p.style.display = p.style.display==='block'?'none':'block'; }
</script>
</body>
</html>

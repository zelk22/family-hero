<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Family Hero 🌟 V15.0 - Super Themes</title>
   <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
   
   <style>
       :root {
           --primary: #6c5ce7; --success: #2ecc71; --special: #e84393;
           --coop: #00cec9; --loot: #f1c40f; --accent: #fdcb6e;
           --bg: #f8f9fa; --text: #2d3436; --danger: #ff7675;
           --card-bg: #ffffff;
       }
       
       /* ערכות נושא */
       body.theme-space { --bg: #1a1a2e; --text: #e1e1e1; --primary: #0f3460; --card-bg: #16213e; --accent: #e94560; }
       body.theme-jungle { --bg: #edf2f4; --text: #2b2d42; --primary: #2d6a4f; --card-bg: #ffffff; --accent: #ffb703; }
       body.theme-gaming { --bg: #000000; --text: #00ff41; --primary: #1a1a1a; --card-bg: #111111; --accent: #00ff41; }
       body.theme-princess { --bg: #fff0f3; --text: #590d22; --primary: #ff4d6d; --card-bg: #ffffff; --accent: #ffb3c1; }

       body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; direction: rtl; transition: 0.5s; }
       .container { max-width: 1100px; margin: 0 auto; }
       
       .children-nav { display: flex; gap: 12px; overflow-x: auto; padding: 15px 0; justify-content: center; }
       .child-tab { background: var(--card-bg); padding: 12px 25px; border-radius: 50px; cursor: pointer; border: 2px solid #eee; font-weight: bold; color: var(--text); }
       .child-tab.active { border-color: var(--primary); background: var(--primary); color: white !important; transform: scale(1.1); }

       .stats-card { background: linear-gradient(135deg, var(--primary), #341f97); color: white; padding: 30px; border-radius: 30px; margin: 15px 0; text-align: center; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
       .treasure-box { font-size: 4rem; font-weight: 900; }
       
       .level-badge { background: var(--accent); color: #000; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; display: inline-block; }

       .wheel-btn { display: none; margin-top: 15px; background: var(--loot); color: #2d3436; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; animation: pulse 1.5s infinite; }
       @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

       .list-item { background: var(--card-bg); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 6px solid transparent; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
       .list-item.completed { background-color: rgba(46, 204, 113, 0.1); border-right-color: var(--success); }
       
       #adminWrapper { background: #ffffff !important; color: #2d3436 !important; padding: 20px; border-radius: 20px; margin-top: 30px; border: 3px solid #6c5ce7; }
       #adminWrapper * { color: #2d3436 !important; }
       .accordion { background: #f1f2f6 !important; border: none; cursor: pointer; padding: 15px; border-radius: 12px; width:100%; display:flex; justify-content:space-between; font-weight:bold; margin-bottom: 5px; }
       .panel { display: none; padding: 15px; background: #fff; border-radius: 0 0 12px 12px; }
       
       .btn-v { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--success); background: none; color: var(--success); cursor: pointer; font-size: 1.3rem; }
       .btn-v.done { background: var(--success); color: white; border: none; }
   </style>
</head>
<body id="mainBody">

<div class="container">
   <header style="text-align: center;">
       <h1 id="appTitle">Family Hero 🌟</h1>
       <div id="dateDisplay" style="font-weight: bold; opacity: 0.8;"></div>
   </header>

   <div id="childrenNav" class="children-nav"></div>
   <div id="coopArea"></div>

   <div class="stats-card" id="mainStatsCard">
       <div id="levelBadge" class="level-badge">דרגה: מתלמד 🛡️</div><br>
       <span style="font-size: 1.3rem; font-weight: bold;">💎 הקופה של <span id="activeNameDisplay">...</span></span>
       <div id="activePoints" class="treasure-box">0</div>
       
       <div style="width:100%; height:14px; background:rgba(255,255,255,0.2); border-radius:10px; margin:10px 0; overflow:hidden;">
           <div id="mainBar" style="height:100%; transition:1s; background:var(--accent); width: 0%;"></div>
       </div>
       <small id="nextGoalText" style="font-weight: bold; display: block; margin-bottom: 10px;"></small>
       <button id="wheelBtn" class="wheel-btn" onclick="spinWheel()">🎡 גלגל המזל היומי!</button>
   </div>

   <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
       <div>
           <h2>📅 משימות</h2>
           <div id="tasksList"></div>
           <h3 style="margin-top: 25px;">🔥 פרויקטים</h3>
           <div id="questsList"></div>
       </div>
       <div>
           <h2>💎 פרסים</h2>
           <div id="rewardsList"></div>
       </div>
   </div>

   <div id="adminWrapper" style="display:none;">
       <h2 style="text-align:center;">🛠️ ניהול הורים</h2>
       
       <button class="accordion" onclick="toggleAcc(this)">👶 הגדרות ילדים ונושאים <span>▼</span></button>
       <div class="panel" id="manageChildren"></div>

       <button class="accordion" onclick="toggleAcc(this)">➕ הוספה מהירה <span>▼</span></button>
       <div class="panel">
           <select id="addType"><option value="task">משימה</option><option value="reward">פרס</option><option value="quest">פרויקט</option><option value="coop">אתגר משפחתי</option></select>
           <input type="text" id="addName" placeholder="שם...">
           <input type="number" id="addVal" placeholder="ערך" style="width:60px;">
           <button onclick="addItem()">הוסף</button>
       </div>

       <button class="accordion" onclick="toggleAcc(this)">📝 עריכת תוכן <span>▼</span></button>
       <div class="panel"><div id="manageTasks"></div><hr><div id="manageRewards"></div></div>

       <button class="accordion" onclick="toggleAcc(this)">📸 צילומי הוכחה <span>▼</span></button>
       <div class="panel" id="proofViewer" style="display:flex; gap:10px; overflow-x:auto;"></div>

       <button onclick="if(confirm('לאפס יום?')){state.dailyDone={};state.proofs={};state.wheelDone={};save();render();}" style="width:100%; margin-top:15px; padding:12px; background:var(--danger); color:white; border:none; border-radius:10px; font-weight:bold;">⏰ איפוס יומי</button>
   </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handleImageUpload(event)">

<script>
   const firebaseConfig = {
       apiKey: "AIzaSyD-JrKHwexfIk-fPPvpMcxGSvXwYp9OUkw",
       authDomain: "family-hero-3a3fd.firebaseapp.com",
       projectId: "family-hero-3a3fd",
       storageBucket: "family-hero-3a3fd.firebasestorage.app",
       messagingSenderId: "882400699018",
       appId: "1:882400699018:web:08af27dde50e387ea10373"
   };
   firebase.initializeApp(firebaseConfig);
   const db = firebase.firestore();
   const docRef = db.collection("data").doc("v875_main_state");

   const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
   let state = { activeChild:0, children:[], tasks:[], rewards:[], quests:[], coops:[], dailyDone:{}, proofs:{}, wheelDone:{} };
   let isInitialLoad = true;

   function save() { if(!isInitialLoad) docRef.set(state); }

   docRef.onSnapshot(doc => {
       if(doc.exists) state = doc.data();
       isInitialLoad = false;
       render();
   });

   function getLevel(pts) {
       if(pts >= 5000) return "אגדה משפחתית 👑";
       if(pts >= 2000) return "גיבור על ⚔️";
       if(pts >= 1000) return "לוחם מיומן 🛡️";
       if(pts >= 500) return "הרפתקן מתקדם ✨";
       return "מתלמד צעיר 🌱";
   }

   function updateTheme(theme) {
       document.body.className = theme ? `theme-${theme}` : '';
       const titles = { space: "Space Hero 🚀", jungle: "Jungle Hero 🐾", gaming: "Pro Gamer 🎮", princess: "Princess Hero 👑" };
       document.getElementById('appTitle').innerText = titles[theme] || "Family Hero 🌟";
   }

   function render() {
       if(!state.children || !state.children[state.activeChild]) return;
       const child = state.children[state.activeChild];
       const done = state.dailyDone[child.id] || [];
       
       updateTheme(child.theme);
       document.getElementById('activePoints').innerText = child.pts;
       document.getElementById('activeNameDisplay').innerText = child.name;
       document.getElementById('levelBadge').innerText = `דרגה: ${getLevel(child.pts)}`;
       document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});

       // גלגל המזל
       const hasUsedWheel = state.wheelDone && state.wheelDone[child.id];
       document.getElementById('wheelBtn').style.display = (done.length >= 7 && !hasUsedWheel) ? 'inline-block' : 'none';

       // יעד הבא
       const nextReward = (state.rewards||[]).filter(r => r.val > child.pts).sort((a,b)=>a.val-b.val)[0];
       if(nextReward) {
           document.getElementById('nextGoalText').innerText = `היעד הבא: ${nextReward.name} (עוד ${nextReward.val - child.pts} נקודות)`;
           document.getElementById('mainBar').style.width = Math.min((child.pts / nextReward.val) * 100, 100) + "%";
       }

       if(isAdmin){
           document.getElementById('adminWrapper').style.display = 'block';
           document.getElementById('childrenNav').innerHTML = state.children.map((c,i)=>`
               <div class="child-tab ${i==state.activeChild?'active':''}" onclick="state.activeChild=${i};render();">${c.name}</div>`).join('');
           renderAdmin();
       }

       // רשימות
       document.getElementById('tasksList').innerHTML = (state.tasks||[]).map(t => `
           <div class="list-item ${done.includes(t.id)?'completed':''}">
               <div><b>${t.name}</b> <small>(+${t.val})</small></div>
               <button class="btn-v ${done.includes(t.id)?'done':''}" onclick="handleTaskClick(${t.id},${t.val})">✓</button>
           </div>`).join('');

       document.getElementById('rewardsList').innerHTML = (state.rewards||[]).map(r => `
           <div class="list-item"><div><b>${r.name}</b> <br><small>${r.val} 💎</small></div>
           <button onclick="buy(${r.val})" style="background:var(--accent); border:none; padding:8px 15px; border-radius:20px; font-weight:bold;">פדה</button></div>`).join('');

       document.getElementById('coopArea').innerHTML = (state.coops||[]).map(c => {
           const total = state.children.reduce((a,b)=>a+(b.pts||0),0);
           return `<div style="background:var(--card-bg); padding:15px; border-radius:20px; border-right:8px solid var(--coop); margin-bottom:15px;">
               <div style="display:flex; justify-content:space-between;"><b>🤝 ${c.name}</b> <span>${total}/${c.goal}</span></div>
               <div style="width:100%; height:8px; background:rgba(0,0,0,0.1); border-radius:5px; margin:5px 0;"><div style="width:${Math.min((total/c.goal)*100,100)}%; height:100%; background:var(--coop); border-radius:5px;"></div></div>
           </div>`}).join('');
   }

   function renderAdmin() {
       document.getElementById('manageChildren').innerHTML = state.children.map((c,i) => `
           <div style="padding:10px; border-bottom:1px solid #eee;">
               <b>${c.name}</b> | נקודות: <input type="number" value="${c.pts}" onchange="state.children[${i}].pts=parseInt(this.value);save();" style="width:60px;">
               | נושא: <select onchange="state.children[${i}].theme=this.value;save();render();">
                   <option value="" ${!c.theme?'selected':''}>ברירת מחדל</option>
                   <option value="space" ${c.theme=='space'?'selected':''}>חלל 🚀</option>
                   <option value="jungle" ${c.theme=='jungle'?'selected':''}>ג'ונגל 🐾</option>
                   <option value="gaming" ${c.theme=='gaming'?'selected':''}>גיימינג 🎮</option>
                   <option value="princess" ${c.theme=='princess'?'selected':''}>נסיכות 👑</option>
               </select>
           </div>`).join('');
       
       document.getElementById('manageTasks').innerHTML = state.tasks.map((t,i) => `
           <div style="display:flex; gap:5px; margin-bottom:5px;">
               <input value="${t.name}" onchange="state.tasks[${i}].name=this.value;save()" style="flex:1;">
               <input type="number" value="${t.val}" onchange="state.tasks[${i}].val=parseInt(this.value);save()" style="width:45px;">
               <button onclick="state.tasks.splice(${i},1);save();render()">🗑️</button>
           </div>`).join('');
   }

   function handleTaskClick(id, val) {
       const child = state.children[state.activeChild];
       if(!state.dailyDone[child.id]) state.dailyDone[child.id]=[];
       const done = state.dailyDone[child.id];
       if(done.includes(id)) {
           done.splice(done.indexOf(id),1); child.pts = Math.max(0, child.pts-val);
       } else {
           done.push(id); child.pts += val; confetti();
       }
       save(); render();
   }

   function spinWheel() {
       const child = state.children[state.activeChild];
       const bonus = [10, 20, 30, 40, 50][Math.floor(Math.random()*5)];
       alert(`מזל טוב! זכית ב-${bonus} נקודות בונוס!`);
       child.pts += bonus;
       if(!state.wheelDone) state.wheelDone = {};
       state.wheelDone[child.id] = true;
       confetti({ particleCount: 150 });
       save(); render();
   }

   function addItem() {
       const t = document.getElementById('addType').value, n = document.getElementById('addName').value, v = parseInt(document.getElementById('addVal').value)||0;
       if(!n) return;
       if(t=='task') state.tasks.push({id:Date.now(), name:n, val:v});
       else if(t=='reward') state.rewards.push({id:Date.now(), name:n, val:v});
       else if(t=='coop') state.coops.push({id:Date.now(), name:n, goal:v});
       save(); render();
   }

   function toggleAcc(el) { const p = el.nextElementSibling; p.style.display = p.style.display==='block'?'none':'block'; }
   function buy(v) { const c = state.children[state.activeChild]; if(c.pts>=v && confirm("לפדות?")){ c.pts-=v; save(); render(); confetti(); }}
</script>
</body>
</html>

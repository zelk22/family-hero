<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Family Hero 🌟 V9.1.0</title>
    
   <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
 
   <style>
       :root {
           --primary: #6c5ce7; --success: #2ecc71; --special: #e84393;
           --coop: #00cec9; --loot: #f1c40f; --accent: #fdcb6e;
           --bg: #f8f9fa; --danger: #ff7675;
       }
       body { font-family: 'Assistant', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; direction: rtl; }
       .container { max-width: 1100px; margin: 0 auto; }
       .children-nav { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; min-height: 50px; scrollbar-width: none; }
       .child-tab { background: white; padding: 10px 20px; border-radius: 15px; cursor: pointer; border: 2px solid #eee; font-weight: bold; white-space: nowrap; }
       .child-tab.active { border-color: var(--primary); background: var(--primary); color: white; }
       .coop-section { background: white; border-radius: 20px; padding: 15px; border-right: 8px solid var(--coop); box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin: 10px 0 20px 0; }
       .stats-card { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: white; padding: 25px; border-radius: 25px; margin: 10px 0; text-align: center; }
       .treasure-box { font-size: 3.5rem; font-weight: 900; }
       .list-item { background: white; border-radius: 15px; padding: 12px; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: center; border-right: 5px solid transparent; transition: 0.3s; }
       .list-item.completed { background-color: #e8f8f0; border-right-color: var(--success); }
       .list-item.completed b { text-decoration: line-through; opacity: 0.6; color: #27ae60; }
       .btn-v { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--success); background: white; color: var(--success); cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
       .btn-v.done { background: var(--success); color: white; border: none; }
       .btn-action { background: var(--accent); border: none; padding: 8px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; }
       .btn-show-more { background: none; border: 1px solid #ddd; color: #888; padding: 8px; width: 100%; border-radius: 10px; cursor: pointer; margin-top: 5px; font-weight: bold; }
       .bar-bg { width: 100%; height: 12px; background: #eee; border-radius: 10px; margin: 8px 0; overflow: hidden; }
       .bar-fill { height: 100%; transition: 0.4s; width: 0%; }
       .accordion { background: #eee; padding: 15px; width: 100%; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; }
       .panel { display: none; padding: 15px; background: white; border: 1px solid #eee; border-radius: 12px; margin-bottom: 15px; }
       .sub-accordion { background: #f9f9f9; padding: 12px; width: 100%; border: 1px solid #f0f0f0; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 5px; text-align: right; display: block; }
       .sub-panel { display: none; padding: 10px; border: 1px solid #f0f0f0; margin-bottom: 10px; border-radius: 10px; }
       .manage-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; border-bottom: 1px solid #f0f0f0; align-items: center; }
       .btn-del { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
       .input-edit { padding: 5px; border-radius: 5px; border: 1px solid #ddd; }
       
       /* הסתרת אלמנטים כברירת מחדל */
       #adminWrapper, #childrenNav { display: none; }
   </style>
</head>
<body>
 
<div class="container">
   <header style="text-align: center; padding: 10px;">
       <h1 style="color: var(--primary); margin: 0;">Family Hero 🌟</h1>
       <div id="dateDisplay" style="color: #888; font-size: 0.9rem;">טוען...</div>
   </header>
 
   <div id="childrenNav" class="children-nav"></div>
   <div id="coopArea"></div>
 
   <div class="stats-card">
       <span style="font-size: 1rem; opacity: 0.9;">💰 תיבת האוצר של <span id="activeNameDisplay">...</span></span>
       <div id="activePoints" class="treasure-box">0</div>
       <div class="progress-wrapper" style="background:rgba(255,255,255,0.2); height:12px; border-radius:10px; margin:15px 0; overflow:hidden;"><div id="mainBar" class="bar-fill" style="background:var(--accent);"></div></div>
       <small id="nextGoalText" style="font-weight: bold;"></small>
   </div>
 
   <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;" class="main-grid">
       <div class="section" style="border-top: 4px solid var(--primary); background: white; padding: 15px; border-radius: 20px;">
           <h2 style="color: var(--primary); margin-top: 0;">📅 משימות יומיות</h2>
           <div id="tasksList"></div>
           <button id="btnMoreTasks" class="btn-show-more" onclick="toggleExpand('tasks')">הצג עוד ▼</button>
           <h3 style="color: var(--special); margin-top: 30px; border-top: 2px solid #f0f0f0; padding-top: 15px;">🔥 פרויקטים</h3>
           <div id="questsList"></div>
       </div>
       <div class="section" style="border-top: 4px solid var(--loot); background: white; padding: 15px; border-radius: 20px;">
           <h2 style="color: var(--loot); margin-top: 0;">💎 חנות הפרסים</h2>
           <div id="rewardsList"></div>
           <button id="btnMoreRewards" class="btn-show-more" onclick="toggleExpand('rewards')">הצג עוד ▼</button>
       </div>
   </div>
 
   <div id="adminWrapper" class="admin-box" style="margin-top: 30px;">
       <button class="accordion" onclick="toggleAcc(this)">⚙️ ניהול מערכת (הורים בלבד) <span>▼</span></button>
       <div class="panel">
           <div class="sub-accordion" onclick="toggleSub(this)">➕ הוספת תוכן <span>▼</span></div>
           <div class="sub-panel">
               <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
                    <div style="flex:1"><label>סוג</label><select id="addType" onchange="updateFormFields()"><option value="task">משימה</option><option value="reward">פרס</option><option value="quest">פרויקט</option><option value="coop">🤝 אתגר משפחתי</option></select></div>
                    <div style="flex:2"><label>שם הפריט</label><input type="text" id="addName" placeholder="שם..."></div>
                    <div style="flex:1"><label id="valLabel">ניקוד/שלבים</label>
                        <select id="addDiff"><option value="2">קל (2)</option><option value="10">בינוני (10)</option><option value="30">קשה (30)</option></select>
                        <input type="number" id="addNum" style="display:none;" value="10">
                    </div>
                    <button class="btn-action" style="background:var(--success); color:white; height:40px;" onclick="addNewContent()">שמור</button>
               </div>
           </div>
           <button class="sub-accordion" onclick="toggleSub(this)">👶 שמות ולינקים לילדים <span>▼</span></button>
           <div class="sub-panel" id="manageChildren"></div>
           <button class="sub-accordion" onclick="toggleSub(this)">📝 עריכת משימות <span>▼</span></button>
           <div class="sub-panel" id="manageTasks"></div>
           <button class="sub-accordion" onclick="toggleSub(this)">🎁 עריכת פרסים <span>▼</span></button>
           <div class="sub-panel" id="manageRewards"></div>
           <button class="sub-accordion" onclick="toggleSub(this)">⏰ איפוס יומי <span>▼</span></button>
           <div class="sub-panel"><button class="btn-show-more" style="color:red; border-color:red" onclick="manualReset()">איפוס סימוני V</button></div>
       </div>
   </div>
</div>
 
<script>
   const firebaseConfig = {
       apiKey: "AIzaSyD-JrKHwexfIk-fPPvpMcxGSvXwYp9OUkw",
       authDomain: "family-hero-3a3fd.firebaseapp.com",
       projectId: "family-hero-3a3fd",
       storageBucket: "family-hero-3a3fd.firebasestorage.app",
       messagingSenderId: "882400699018",
       appId: "1:882400699018:web:08af27dde50e387ea10373"
   };
 
   firebase.initializeApp(firebaseConfig);
   const db = firebase.firestore();
   const docRef = db.collection("data").doc("v875_main_state");
 
   const urlParams = new URLSearchParams(window.location.search);
   const isAdmin = urlParams.get('admin') === 'true';
   const childIdParam = urlParams.get('child');

   let state = { activeChild: 0, children: [], tasks: [], rewards: [], quests: [], coops: [], dailyDone: {} };
   let isInitialLoad = true;

   function save() { if(!isInitialLoad) docRef.set(state).catch(err => console.error(err)); }
 
   docRef.onSnapshot((doc) => {
       if (doc && doc.exists) { 
           state = doc.data();
           if (childIdParam) {
               const idx = state.children.findIndex(c => c.id == childIdParam);
               if (idx !== -1) state.activeChild = idx;
           }
       }
       isInitialLoad = false; 
       render(); 
   });
 
   function render() {
       if(!state.children || !state.children[state.activeChild]) return;
       const child = state.children[state.activeChild];
       const doneList = state.dailyDone[child.id] || [];
       const totalFamilyPoints = state.children.reduce((s, c) => s + (c.pts || 0), 0);
 
       document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('he-IL', { weekday:'long', day:'numeric', month:'long' });
       document.getElementById('activePoints').innerText = child.pts;
       document.getElementById('activeNameDisplay').innerText = child.name;
       
       // לוגיקת תצוגה: הורה מול ילד
       if (isAdmin) {
           document.getElementById('adminWrapper').style.display = 'block';
           document.getElementById('childrenNav').style.display = 'flex';
           document.getElementById('childrenNav').innerHTML = state.children.map((c, idx) => `<div class="child-tab ${idx===state.activeChild?'active':''}" onclick="state.activeChild=${idx}; render();">${c.name}</div>`).join('');
       } else {
           document.getElementById('adminWrapper').style.display = 'none';
           document.getElementById('childrenNav').style.display = 'none';
       }
 
       // שאר הרינדור (משימות, פרסים וכו')
       document.getElementById('tasksList').innerHTML = (config.expandedTasks ? state.tasks : state.tasks.slice(0, 5)).map(t => `<div class="list-item ${doneList.includes(t.id)?'completed':''}"><div><b>${t.name}</b><br><small>+${t.val}</small></div><button class="btn-v ${doneList.includes(t.id)?'done':''}" onclick="toggleTask(${t.id}, ${t.val})">✓</button></div>`).join('');
       document.getElementById('rewardsList').innerHTML = (config.expandedRewards ? state.rewards : state.rewards.slice(0, 5)).map(r => `<div class="list-item"><div><b>${r.name}</b><br><small>${r.val}💎</small></div><button class="btn-action" onclick="if(state.children[state.activeChild].pts>=${r.val}){state.children[state.activeChild].pts-=${r.val}; render(); save();}else{alert('חסר נקודות');}">פדה</button></div>`).join('');
       document.getElementById('questsList').innerHTML = (state.quests||[]).map(q => `<div class="list-item" style="flex-direction:column; align-items:start;"><div style="width:100%; display:flex; justify-content:space-between;"><b>${q.name}</b> <span>${q.current}/${q.steps}</span></div><div class="bar-bg"><div class="bar-fill" style="width:${(q.current/q.steps)*100}%; background:var(--special)"></div></div><button class="btn-action" style="font-size:0.75rem; width:100%;" onclick="advanceQuest(${q.id})">+ התקדמות</button></div>`).join('');
       document.getElementById('coopArea').innerHTML = (state.coops||[]).map(c => `<div class="coop-section"><b>🤝 ${c.name}</b> (${totalFamilyPoints}/${c.goal})<div class="bar-bg"><div class="bar-fill" style="width:${Math.min((totalFamilyPoints/c.goal)*100, 100)}%; background:var(--coop)"></div></div></div>`).join('');

       if (isAdmin) {
           const base = window.location.href.split('?')[0];
           document.getElementById('manageChildren').innerHTML = state.children.map((c, i) => `<div class="manage-row" style="background:#f4f4f4; margin-bottom:5px; padding:10px; border-radius:10px;">
               <input class="input-edit" style="width:100px" value="${c.name}" onchange="state.children[${i}].name=this.value; save();">
               <div style="font-size:0.7rem; color:#666; word-break:break-all;">לינק: ${base}?child=${c.id}</div>
           </div>`).join('');
       }

       const nextR = state.rewards.filter(r => r.val > child.pts).sort((a,b)=>a.val-b.val)[0] || state.rewards[0];
       if(nextR) {
           document.getElementById('mainBar').style.width = Math.min((child.pts / nextR.val) * 100, 100) + "%";
           document.getElementById('nextGoalText').innerText = `המטרה: ${nextR.name} (${nextR.val} נק')`;
       }
    }

   let config = { expandedTasks: false, expandedRewards: false };
   function toggleExpand(t) { if(t==='tasks') config.expandedTasks=!config.expandedTasks; else config.expandedRewards=!config.expandedRewards; render(); }
   function toggleTask(id, v) {
       const c = state.children[state.activeChild];
       if(!state.dailyDone[c.id]) state.dailyDone[c.id] = [];
       const idx = state.dailyDone[c.id].indexOf(id);
       if(idx===-1){ state.dailyDone[c.id].push(id); c.pts+=v; } else { state.dailyDone[c.id].splice(idx,1); c.pts-=v; }
       render(); save();
   }
   function advanceQuest(id) {
       const q = state.quests.find(x => x.id === id);
       if (q && q.current < q.steps) {
           q.current++;
           if (q.current >= q.steps) { state.children[state.activeChild].pts += 100; q.current = 0; }
           render(); save();
       }
   }
   function addNewContent() {
       const t = document.getElementById('addType').value;
       const n = document.getElementById('addName').value;
       if(!n) return;
       const v = (t==='task')?parseInt(document.getElementById('addDiff').value):parseInt(document.getElementById('addNum').value);
       if(t==='task') state.tasks.push({id:Date.now(), name:n, val:v});
       else if(t==='reward') state.rewards.push({id:Date.now(), name:n, val:v});
       else if(t==='quest') state.quests.push({id:Date.now(), name:n, steps:v, current:0});
       else if(t==='coop') state.coops.push({id:Date.now(), name:n, goal:v});
       render(); save();
       document.getElementById('addName').value='';
   }
   function updateFormFields() {
       document.getElementById('addDiff').style.display = (document.getElementById('addType').value==='task')?'block':'none';
       document.getElementById('addNum').style.display = (document.getElementById('addType').value!=='task')?'block':'none';
   }
   function toggleAcc(el) { const p = el.nextElementSibling; p.style.display = p.style.display === "block" ? "none" : "block"; }
   function toggleSub(el) { const p = el.nextElementSibling; p.style.display = p.style.display === "block" ? "none" : "block"; }
   function manualReset() { if(confirm('לאפס?')) { state.dailyDone = {}; render(); save(); } }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Family Hero Classic Plus 🌟</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4a90e2; --success: #2ecc71; --bg: #f0f2f5; --text: #2d3436; --card: #ffffff;
        }
        
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; direction: rtl; }
        .container { max-width: 800px; margin: 0 auto; }

        /* לוח הודעות הורים */
        #parentMessage {
            background: linear-gradient(135deg, #fff9c4, #fff176);
            border-right: 8px solid #fbc02d;
            padding: 15px; border-radius: 15px; margin: 10px 0 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center; font-weight: 800; font-size: 1.1rem; color: #5f4b00;
        }

        /* ניווט ילדים */
        .children-nav { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; justify-content: center; }
        .child-tab { 
            background: var(--card); padding: 10px 20px; border-radius: 30px; 
            cursor: pointer; border: 1px solid #ddd; font-weight: bold; white-space: nowrap;
        }
        .child-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* כרטיס סטטיסטיקה */
        .stats-card { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            text-align: center; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .rank-badge { 
            display: inline-block; padding: 4px 15px; background: #6c5ce7; 
            color: white; border-radius: 50px; font-weight: 800; font-size: 0.85rem; margin-bottom: 10px;
        }
        .diamond-count { font-size: 3.5rem; font-weight: 900; color: var(--primary); margin: 5px 0; line-height: 1; }
        
        .level-progress-container { width: 100%; height: 10px; background: #eee; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .level-progress-bar { height: 100%; background: #2ecc71; width: 0%; transition: 1s; }

        /* רשימות - תיקון פריסה */
        .grid { display: flex; flex-direction: row; gap: 15px; align-items: flex-start; }
        .grid > section { flex: 1; }
        @media (max-width: 600px) { .grid { flex-direction: column; } .grid > section { width: 100%; } }

        .list-item { 
            background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #eee;
        }
        .list-item.completed { background: #f9f9f9; opacity: 0.8; }
        .list-item.completed b { text-decoration: line-through; color: #999; }

        .btn-check { 
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--success);
            background: none; color: var(--success); font-size: 1.2rem; cursor: pointer;
        }
        .btn-check.done { background: var(--success); color: white; }

        #adminPanel { background: #333; color: white; padding: 20px; border-radius: 20px; margin-top: 40px; display: none; }
        .admin-section { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        input { padding: 8px; border-radius: 5px; border: none; margin: 2px; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align: center; padding: 10px;">
        <h1 style="margin:0; font-size: 1.8rem;">Family Hero 🌟</h1>
    </header>

    <div id="childrenNav" class="children-nav"></div>
    <div id="parentMessage" style="display:none;"></div>

    <div class="stats-card">
        <div id="rankDisplay" class="rank-badge">טוען...</div>
        <div style="font-weight: bold;">היהלומים של <span id="activeName"></span></div>
        <div id="pointsDisplay" class="diamond-count">0</div>
        
        <div class="level-progress-container"><div id="levelBar" class="level-progress-bar"></div></div>
        <div id="levelInfo" style="font-size: 0.8rem; margin-top: 5px;"></div>
    </div>

    <div class="grid">
        <section>
            <h3 style="text-align: center;">✅ משימות</h3>
            <div id="tasksList"></div>
        </section>
        <section>
            <h3 style="text-align: center;">🎁 פרסים</h3>
            <div id="rewardsList"></div>
        </section>
    </div>

    <!-- פאנל ניהול -->
    <div id="adminPanel">
        <h3>🛠️ ניהול הורים</h3>
        <div class="admin-section">
            <label>הודעת עידוד:</label><br>
            <input type="text" id="newParentMsg" style="width:70%"><button onclick="updateMessage()">עדכן</button>
        </div>
        <div class="admin-section">
            <div id="adminTasks"></div>
            <button onclick="addTask()">+ משימה</button>
        </div>
        <div class="admin-section">
            <div id="adminChildren"></div>
        </div>
        <button onclick="dailyReset()" style="width:100%; padding:10px; background:red; color:white; border:none; border-radius:10px;">איפוס יומי</button>
    </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handleImageUpload(event)">

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD-JrKHwexfIk-fPPvpMcxGSvXwYp9OUkw",
        authDomain: "family-hero-3a3fd.firebaseapp.com",
        projectId: "family-hero-3a3fd",
        storageBucket: "family-hero-3a3fd.firebasestorage.app",
        messagingSenderId: "882400699018",
        appId: "1:882400699018:web:08af27dde50e387ea10373"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    // שימוש בכתובת המקורית כדי שהנתונים שלך יופיעו
    const docRef = db.collection("data").doc("family_hero_state");

    let state = { activeChild: 0, children: [], tasks: [], rewards: [], dailyDone: {}, parentMsg: "" };
    let isInitialLoad = true;
    const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';

    function getRank(pts) {
        if (pts < 200) return { title: "טירון 🌱", next: 200 };
        if (pts < 600) return { title: "אביר מתלמד ⚔️", next: 600 };
        if (pts < 1500) return { title: "גיבור הבית 🛡️", next: 1500 };
        return { title: "אגדה 🔥", next: 5000 };
    }

    docRef.onSnapshot(doc => {
        if (doc.exists) { state = doc.data(); isInitialLoad = false; render(); }
    });

    function save() { if (!isInitialLoad) docRef.set(state); }

    function render() {
        if (!state.children.length) return;
        const child = state.children[state.activeChild];
        const doneList = state.dailyDone[child.id] || [];

        // הודעת הורים
        const msgDiv = document.getElementById('parentMessage');
        if (state.parentMsg) { msgDiv.innerText = "📣 " + state.parentMsg; msgDiv.style.display = "block"; }
        else { msgDiv.style.display = "none"; }

        // סטטיסטיקה
        const rank = getRank(child.pts);
        document.getElementById('rankDisplay').innerText = rank.title;
        document.getElementById('pointsDisplay').innerText = child.pts;
        document.getElementById('activeName').innerText = child.name;
        document.getElementById('levelBar').style.width = Math.min((child.pts/rank.next)*100, 100) + "%";
        document.getElementById('levelInfo').innerText = `עוד ${rank.next - child.pts} לדרגה הבאה`;

        // ניווט
        document.getElementById('childrenNav').innerHTML = state.children.map((c, i) => `
            <div class="child-tab ${i === state.activeChild ? 'active' : ''}" onclick="state.activeChild=${i};render();">${c.name}</div>
        `).join('');

        // רשימות
        document.getElementById('tasksList').innerHTML = state.tasks.map(t => `
            <div class="list-item ${doneList.includes(t.id) ? 'completed' : ''}">
                <div onclick="openCam(${t.id})">📸 <b>${t.name}</b></div>
                <button class="btn-check ${doneList.includes(t.id) ? 'done' : ''}" onclick="toggleTask(${t.id}, ${t.val})">✓</button>
            </div>`).join('');

        document.getElementById('rewardsList').innerHTML = state.rewards.map(r => `
            <div class="list-item">
                <b>${r.name} (${r.val})</b>
                <button onclick="buy(${r.val})" style="background:var(--primary); color:white; border:none; padding:5px 10px; border-radius:8px;">פדה</button>
            </div>`).join('');

        if (isAdmin) { document.getElementById('adminPanel').style.display = 'block'; renderAdmin(); }
    }

    function toggleTask(id, v) {
        const cid = state.children[state.activeChild].id;
        if (!state.dailyDone[cid]) state.dailyDone[cid] = [];
        if (state.dailyDone[cid].includes(id)) {
            state.dailyDone[cid].splice(state.dailyDone[cid].indexOf(id), 1);
            state.children[state.activeChild].pts -= v;
        } else {
            state.dailyDone[cid].push(id);
            state.children[state.activeChild].pts += v;
            confetti();
        }
        save(); render();
    }

    function updateMessage() { state.parentMsg = document.getElementById('newParentMsg').value; save(); render(); }
    function openCam(id) { document.getElementById('cameraInput').click(); }
    function handleImageUpload(e) { alert("התמונה נשלחה!"); }
    function buy(v) { 
        if (state.children[state.activeChild].pts >= v) {
            state.children[state.activeChild].pts -= v; save(); render(); confetti();
        } else { alert("אין לך מספיק יהלומים!"); }
    }
    
    function renderAdmin() {
        document.getElementById('adminChildren').innerHTML = state.children.map((c, i) => `
            <div>${c.name}: <input type="number" value="${c.pts}" onchange="state.children[${i}].pts=parseInt(this.value);save()"></div>
        `).join('');
    }
    function dailyReset() { state.dailyDone = {}; save(); render(); }
</script>
</body>
</html>

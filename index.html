<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Family Hero 🌟 V16.0 - Ultimate Themes</title>
   <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
   <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&family=Rubik+Mono+One&family=Secular+One&display=swap" rel="stylesheet">
   
   <style>
       :root { --primary: #6c5ce7; --success: #2ecc71; --bg: #f8f9fa; --text: #2d3436; --card: #fff; }

       /* --- 10 ערכות נושא מטורפות --- */
       body.theme-space { --bg: #0b0d17; --text: #fff; --primary: #4834d4; --card: #161d33; --accent: #00d2ff; background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); }
       body.theme-jungle { --bg: #1b4332; --text: #f1f8e9; --primary: #74c69d; --card: #2d6a4f; --accent: #ffb703; }
       body.theme-candy { --bg: #ffafcc; --text: #5c4d7d; --primary: #ff5d8f; --card: #fff; --accent: #cdb4db; }
       body.theme-hero { --bg: #d90429; --text: #fff; --primary: #2b2d42; --card: #ef233c; --accent: #edf2f4; }
       body.theme-magic { --bg: #3c096c; --text: #ff9e00; --primary: #7b2cbf; --card: #5a189a; --accent: #ff6d00; }
       body.theme-gaming { --bg: #121212; --text: #0cf; --primary: #1a1a1a; --card: #1f1f1f; --accent: #f0f; border: 2px solid #0cf; }
       body.theme-hacker { --bg: #000; --text: #0f0; --primary: #020; --card: #050; --accent: #0f0; font-family: 'Courier New', monospace; }
       body.theme-sports { --bg: #212529; --text: #fff; --primary: #f8f9fa; --card: #343a40; --accent: #ffca28; }
       body.theme-social { --bg: #ffffff; --text: #000; --primary: #fe2c55; --card: #f1f1f1; --accent: #25f4ee; }
       body.theme-minimal { --bg: #f5f5f7; --text: #1d1d1f; --primary: #000; --card: #fff; --accent: #0071e3; }

       body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; direction: rtl; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
       .container { max-width: 1000px; margin: 0 auto; }
       
       .children-nav { display: flex; gap: 10px; overflow-x: auto; padding: 10px; justify-content: center; }
       .child-tab { background: var(--card); padding: 10px 20px; border-radius: 15px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; opacity: 0.7; color: var(--text); }
       .child-tab.active { border-color: var(--accent); opacity: 1; transform: scale(1.1); font-weight: 800; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

       .stats-card { background: var(--card); color: var(--text); padding: 30px; border-radius: 30px; margin: 15px 0; text-align: center; border: 3px solid var(--primary); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
       .treasure-box { font-size: 5rem; font-weight: 900; text-shadow: 2px 2px var(--primary); }
       
       .list-item { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 5px solid var(--primary); }
       .list-item.completed { opacity: 0.5; filter: grayscale(1); }

       .btn-v { width: 50px; height: 50px; border-radius: 15px; border: none; background: var(--primary); color: white; cursor: pointer; font-size: 1.5rem; transition: 0.2s; }
       .btn-v.done { background: var(--success); }

       #adminWrapper { background: #fff !important; color: #333 !important; padding: 25px; border-radius: 25px; margin-top: 50px; border: 5px solid #000; }
       #adminWrapper * { color: #333 !important; }
       .accordion { background: #eee !important; border: none; padding: 15px; width: 100%; text-align: right; font-weight: bold; margin-top: 5px; cursor: pointer; border-radius: 10px; }
       .panel { display: none; padding: 15px; border: 1px solid #ddd; border-top: none; }
       
       .manage-row { display: flex; gap: 5px; margin-bottom: 10px; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 5px; }
       .manage-row input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
   </style>
</head>
<body id="mainBody">

<div class="container">
   <header style="text-align: center; padding: 20px;">
       <h1 id="appTitle" style="font-size: 2.5rem; margin: 0;">Family Hero</h1>
       <div id="dateDisplay"></div>
   </header>

   <div id="childrenNav" class="children-nav"></div>

   <div id="coopArea"></div>

   <div class="stats-card" id="mainStatsCard">
       <div id="levelBadge" style="font-weight: bold; color: var(--accent);"></div>
       <div style="font-size: 1.2rem;">היהלומים של <span id="activeNameDisplay"></span></div>
       <div id="activePoints" class="treasure-box">0</div>
       
       <div style="width:100%; height:18px; background:rgba(0,0,0,0.1); border-radius:10px; margin:15px 0; overflow:hidden;">
           <div id="mainBar" style="height:100%; transition:1.5s ease-out; background:var(--primary); width: 0%;"></div>
       </div>
       <div id="nextGoalText"></div>
       <button id="wheelBtn" style="display:none; margin-top:15px; padding:10px 20px; border-radius:50px; background:var(--accent); border:none; cursor:pointer; font-weight:bold;" onclick="spinWheel()">🎡 גלגל המזל!</button>
   </div>

   <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
       <div>
           <h2>✅ משימות</h2>
           <div id="tasksList"></div>
           <h2>🚀 פרויקטים</h2>
           <div id="questsList"></div>
       </div>
       <div>
           <h2>🎁 פרסים</h2>
           <div id="rewardsList"></div>
       </div>
   </div>

   <!-- פאנל ניהול הורים -->
   <div id="adminWrapper" style="display:none;">
       <h2 style="text-align:center;">⚙️ שליטה מלאה - הורים</h2>
       
       <button class="accordion" onclick="toggleAcc(this)">👶 הגדרות ילדים וערכות נושא <span>▼</span></button>
       <div class="panel" id="manageChildren"></div>

       <button class="accordion" onclick="toggleAcc(this)">📋 עריכת משימות <span>▼</span></button>
       <div class="panel" id="adminTasks"></div>

       <button class="accordion" onclick="toggleAcc(this)">💎 עריכת פרסים <span>▼</span></button>
       <div class="panel" id="adminRewards"></div>

       <button class="accordion" onclick="toggleAcc(this)">🔥 עריכת פרויקטים ואתגרים <span>▼</span></button>
       <div class="panel" id="adminQuests"></div>

       <button class="accordion" onclick="toggleAcc(this)">➕ הוספה מהירה <span>▼</span></button>
       <div class="panel">
           <select id="addType"><option value="task">משימה</option><option value="reward">פרס</option><option value="quest">פרויקט</option><option value="coop">אתגר משפחתי</option></select>
           <input type="text" id="addName" placeholder="שם...">
           <input type="number" id="addVal" placeholder="ערך/יעד">
           <button onclick="addItem()" style="background:green; color:white; padding:5px 15px;">הוסף</button>
       </div>

       <button onclick="if(confirm('לאפס יום?')){state.dailyDone={};state.wheelDone={};save();render();}" style="width:100%; margin-top:20px; padding:15px; background:#ff7675; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">⏰ איפוס יומי (ניקוי V)</button>
   </div>
</div>

<script>
   const firebaseConfig = {
       apiKey: "AIzaSyD-JrKHwexfIk-fPPvpMcxGSvXwYp9OUkw",
       authDomain: "family-hero-3a3fd.firebaseapp.com",
       projectId: "family-hero-3a3fd",
       storageBucket: "family-hero-3a3fd.firebasestorage.app",
       messagingSenderId: "882400699018",
       appId: "1:882400699018:web:08af27dde50e387ea10373"
   };
   firebase.initializeApp(firebaseConfig);
   const db = firebase.firestore();
   const docRef = db.collection("data").doc("v875_main_state");

   const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
   let state = { activeChild:0, children:[], tasks:[], rewards:[], quests:[], coops:[], dailyDone:{}, wheelDone:{} };
   let isInitialLoad = true;

   docRef.onSnapshot(doc => {
       if(doc.exists) state = doc.data();
       isInitialLoad = false;
       render();
   });

   function save() { if(!isInitialLoad) docRef.set(state); }

   const themes = {
       space: "חלוצי חלל 🚀", jungle: "הג'ונגל 🦁", candy: "עולם הממתקים 🍭",
       hero: "גיבורי על 🦸‍♂️", magic: "קסמים 🦄", gaming: "גיימרים 🎮",
       hacker: "האקר 💻", sports: "ספורט ⚽", social: "טיקטוק 📱", minimal: "אלגנט 🧊"
   };

   function render() {
       if(!state.children || !state.children[state.activeChild]) return;
       const child = state.children[state.activeChild];
       const done = state.dailyDone[child.id] || [];
       
       document.body.className = child.theme ? `theme-${child.theme}` : 'theme-minimal';
       document.getElementById('appTitle').innerText = themes[child.theme] || "Family Hero";
       document.getElementById('activePoints').innerText = child.pts;
       document.getElementById('activeNameDisplay').innerText = child.name;
       document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});

       // גלגל המזל
       document.getElementById('wheelBtn').style.display = (done.length >= 7 && (!state.wheelDone || !state.wheelDone[child.id])) ? 'inline-block' : 'none';

       // יעד הבא
       const nextReward = (state.rewards||[]).filter(r => r.val > child.pts).sort((a,b)=>a.val-b.val)[0];
       if(nextReward) {
           document.getElementById('nextGoalText').innerText = `עוד ${nextReward.val - child.pts} ל${nextReward.name}`;
           document.getElementById('mainBar').style.width = Math.min((child.pts / nextReward.val) * 100, 100) + "%";
       }

       if(isAdmin) {
           document.getElementById('adminWrapper').style.display = 'block';
           document.getElementById('childrenNav').innerHTML = state.children.map((c,i)=>`
               <div class="child-tab ${i==state.activeChild?'active':''}" onclick="state.activeChild=${i};render();">${c.name}</div>`).join('');
           renderAdmin();
       }

       // רשימות
       document.getElementById('tasksList').innerHTML = state.tasks.map(t => `
           <div class="list-item ${done.includes(t.id)?'completed':''}">
               <div><b>${t.name}</b> <small>(+${t.val})</small></div>
               <button class="btn-v ${done.includes(t.id)?'done':''}" onclick="handleTask(${t.id},${t.val})">V</button>
           </div>`).join('');

       document.getElementById('rewardsList').innerHTML = state.rewards.map(r => `
           <div class="list-item">
               <div><b>${r.name}</b> <br><small>${r.val} 💎</small></div>
               <button onclick="buy(${r.val})" style="background:var(--accent); border:none; padding:8px; border-radius:10px; color:#000;">פדה</button>
           </div>`).join('');
       
       document.getElementById('questsList').innerHTML = (state.quests||[]).map(q => `
           <div class="list-item" style="flex-direction:column; align-items:start;">
               <div style="width:100%; display:flex; justify-content:space-between;"><b>${q.name}</b> <span>${q.current||0}/${q.steps}</span></div>
               <button onclick="advQuest(${q.id})" style="font-size:0.7rem; margin-top:5px;">התקדמות +</button>
           </div>`).join('');
   }

   function renderAdmin() {
       // הגדרות ילדים
       document.getElementById('manageChildren').innerHTML = state.children.map((c,i) => `
           <div class="manage-row">
               <input value="${c.name}" onchange="state.children[${i}].name=this.value;save()">
               <input type="number" value="${c.pts}" onchange="state.children[${i}].pts=parseInt(this.value);save()" style="width:60px;">
               <select onchange="state.children[${i}].theme=this.value;save();render();">
                   ${Object.entries(themes).map(([k,v])=>`<option value="${k}" ${c.theme==k?'selected':''}>${v}</option>`).join('')}
               </select>
           </div>`).join('');

       // משימות
       document.getElementById('adminTasks').innerHTML = state.tasks.map((t,i) => `
           <div class="manage-row">
               <input value="${t.name}" onchange="state.tasks[${i}].name=this.value;save()" style="flex:1;">
               <input type="number" value="${t.val}" onchange="state.tasks[${i}].val=parseInt(this.value);save()" style="width:50px;">
               <button onclick="state.tasks.splice(${i},1);save();render()">🗑️</button>
           </div>`).join('');

       // פרסים
       document.getElementById('adminRewards').innerHTML = state.rewards.map((r,i) => `
           <div class="manage-row">
               <input value="${r.name}" onchange="state.rewards[${i}].name=this.value;save()" style="flex:1;">
               <input type="number" value="${r.val}" onchange="state.rewards[${i}].val=parseInt(this.value);save()" style="width:60px;">
               <button onclick="state.rewards.splice(${i},1);save();render()">🗑️</button>
           </div>`).join('');

       // פרויקטים
       document.getElementById('adminQuests').innerHTML = state.quests.map((q,i) => `
           <div class="manage-row">
               <input value="${q.name}" onchange="state.quests[${i}].name=this.value;save()" style="flex:1;">
               <input type="number" value="${q.steps}" onchange="state.quests[${i}].steps=parseInt(this.value);save()" style="width:50px;">
               <button onclick="state.quests.splice(${i},1);save();render()">🗑️</button>
           </div>`).join('');
   }

   function handleTask(id, val) {
       const child = state.children[state.activeChild];
       if(!state.dailyDone[child.id]) state.dailyDone[child.id]=[];
       const done = state.dailyDone[child.id];
       if(done.includes(id)) {
           done.splice(done.indexOf(id),1); child.pts -= val;
       } else {
           done.push(id); child.pts += val; confetti();
       }
       save(); render();
   }

   function spinWheel() {
       const bonus = [10, 20, 30, 50, 100][Math.floor(Math.random()*5)];
       alert("קיבלת בונוס של " + bonus + " נקודות!");
       state.children[state.activeChild].pts += bonus;
       if(!state.wheelDone) state.wheelDone = {};
       state.wheelDone[state.children[state.activeChild].id] = true;
       confetti(); save(); render();
   }

   function addItem() {
       const type = document.getElementById('addType').value;
       const name = document.getElementById('addName').value;
       const val = parseInt(document.getElementById('addVal').value)||0;
       if(!name) return;
       if(type=='task') state.tasks.push({id:Date.now(), name, val});
       else if(type=='reward') state.rewards.push({id:Date.now(), name, val});
       else if(type=='quest') state.quests.push({id:Date.now(), name, steps:val, current:0});
       save(); render();
   }

   function toggleAcc(el) { const p = el.nextElementSibling; p.style.display = p.style.display==='block'?'none':'block'; }
   function buy(v) { const c = state.children[state.activeChild]; if(c.pts>=v && confirm("לפדות?")){ c.pts-=v; save(); render(); confetti(); }}
   function advQuest(id) { const q = state.quests.find(x=>x.id==id); if(q && q.current < q.steps){ q.current++; if(q.current>=q.steps){ state.children[state.activeChild].pts+=100; q.current=0; } save(); render(); }}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hero Admin 🌟 V9.0.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD-JrKHwexfIk-fPPvpMcxGSvXwYp9OUkw",
            authDomain: "family-hero-3a3fd.firebaseapp.com",
            projectId: "family-hero-3a3fd",
            storageBucket: "family-hero-3a3fd.firebasestorage.app",
            messagingSenderId: "882400699018",
            appId: "1:882400699018:web:08af27dde50e387ea10373"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const docRef = db.collection("data").doc("v900_state");

        let state = {
            activeChild: 0,
            isAdmin: false,
            children: [
                {id:1, name:"ילד 1", pts:0}, {id:2, name:"ילד 2", pts:0}, 
                {id:3, name:"ילד 3", pts:0}, {id:4, name:"ילד 4", pts:0}
            ],
            tasks: [
                {id:1, name:"צחצוח שיניים", val:2}, {id:2, name:"סידור מיטה", val:2}, 
                {id:3, name:"שיעורי בית", val:10}, {id:4, name:"מקלחת בזמן", val:10},
                {id:5, name:"עריכת שולחן", val:5}, {id:6, name:"סידור תיק", val:5},
                {id:7, name:"איסוף משחקים", val:5}, {id:8, name:"קריאה", val:10},
                {id:9, name:"עזרה בבית", val:15}, {id:10, name:"התארגנות בוקר", val:10}
            ],
            rewards: [
                {id:101, name:"ממתק קטן", val:30}, {id:102, name:"30 דק' מסך", val:100}, 
                {id:103, name:"תיבת הפתעה", val:150}, {id:104, name:"בחירת ארוחה", val:200},
                {id:105, name:"סרט בערב", val:300}, {id:106, name:"גלידה", val:500},
                {id:107, name:"חבר לישון", val:600}, {id:108, name:"צעצוע קטן", val:800},
                {id:109, name:"יום כיף", val:1200}, {id:110, name:"טיול לבחירה", val:1500}
            ],
            quests: [{id:201, name:"חוברת עבודה", steps:10, current:0, val:100}],
            dailyDone: {}
        };

        function save() { docRef.set(state); }

        docRef.onSnapshot((doc) => {
            if (doc.exists()) { state = {...state, ...doc.data()}; render(); } 
            else { save(); }
        });

        function toggleTask(tId, val) {
            const childId = state.children[state.activeChild].id;
            if(!state.dailyDone[childId]) state.dailyDone[childId] = [];
            const idx = state.dailyDone[childId].indexOf(tId);
            if(idx === -1) { state.dailyDone[childId].push(tId); state.children[state.activeChild].pts += val; }
            else { state.dailyDone[childId].splice(idx, 1); state.children[state.activeChild].pts -= val; }
            save();
        }

        function addItem(type) {
            const name = prompt("שם הפריט:");
            const val = parseInt(prompt("ערך (נקודות):"));
            if(name && val) {
                state[type].push({id: Date.now(), name, val});
                save();
            }
        }

        function deleteItem(type, id) {
            if(confirm("למחוק?")) {
                state[type] = state[type].filter(i => i.id !== id);
                save();
            }
        }

        function render() {
            const child = state.children[state.activeChild];
            const doneList = state.dailyDone[child.id] || [];
            
            document.getElementById('tabs').innerHTML = state.children.map((c,i) => 
                `<div class="tab ${i===state.activeChild?'active':''}" onclick="state.activeChild=${i};render()">${c.name}</div>`).join('');

            document.getElementById('cName').innerText = child.name;
            document.getElementById('pts').innerText = child.pts;
            
            const nextR = state.rewards.find(r => r.val > child.pts) || state.rewards[state.rewards.length-1];
            document.getElementById('progressBar').style.width = Math.min((child.pts/nextR.val)*100, 100) + "%";
            document.getElementById('goalText').innerText = `היעד: ${nextR.name} (${nextR.val} נק')`;

            // משימות
            document.getElementById('tasksList').innerHTML = state.tasks.map(t => {
                const isDone = doneList.includes(t.id);
                return `<div class="item ${isDone?'done':''}">
                    <span>${t.name} (+${t.val})</span>
                    <div style="display:flex; gap:5px;">
                        ${state.isAdmin ? `<button onclick="deleteItem('tasks', ${t.id})" style="background:none; border:none; cursor:pointer;">🗑️</button>` : ''}
                        <button class="btn-v ${isDone?'active':''}" onclick="toggleTask(${t.id},${t.val})">${isDone?'✅':'V'}</button>
                    </div>
                </div>`;
            }).join('');

            // פרסים
            document.getElementById('rewardsList').innerHTML = state.rewards.map(r => `
                <div class="item">
                    <span>${r.name} (${r.val})</span>
                    <div style="display:flex; gap:5px;">
                        ${state.isAdmin ? `<button onclick="deleteItem('rewards', ${r.id})" style="background:none; border:none; cursor:pointer;">🗑️</button>` : ''}
                        <button class="btn-action" onclick="if(confirm('לפדות ${r.name}?')){if(state.children[state.activeChild].pts>=${r.val}){state.children[state.activeChild].pts-=${r.val};save();}else{alert('אין מספיק נקודות');}}">פדה</button>
                    </div>
                </div>`).join('');

            document.getElementById('adminControls').style.display = state.isAdmin ? 'block' : 'none';
        }
    </script>

    <style>
        :root { --p: #6c5ce7; --bg: #f8f9fa; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); direction: rtl; padding: 10px; margin: 0; }
        .card { background: white; max-width: 900px; margin: auto; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; }
        .tab { background: #eee; padding: 10px 15px; border-radius: 12px; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .tab.active { background: var(--p); color: white; }
        .stats { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: white; padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        
        /* Grid Layout for Desktop */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .main-grid { grid-template-columns: 1fr; } }

        .section { background: #fdfdfd; padding: 15px; border-radius: 15px; border: 1px solid #eee; }
        .item { background: white; border: 1px solid #f0f0f0; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .item.done { background: #e8f8f0; border-color: #2ecc71; }
        .bar-bg { width: 100%; height: 10px; background: rgba(0,0,0,0.05); border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; background: #fdcb6e; transition: 0.5s; width: 0%; }
        .btn-v { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--p); background: white; cursor: pointer; }
        .btn-v.active { background: #2ecc71; border-color: #2ecc71; color: white; }
        .btn-action { background: #fdcb6e; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-admin-toggle { background: #eee; border: none; padding: 10px; border-radius: 10px; width: 100%; margin-top: 20px; cursor: pointer; color: #777; }
    </style>
</head>
<body onload="render()">
    <div class="card">
        <div id="tabs" class="tabs"></div>
        <div class="stats">
            <h2 id="cName" style="margin:0;">...</h2>
            <div id="pts" style="font-size: 3rem; font-weight: 900;">0</div>
            <div class="bar-bg"><div id="progressBar" class="bar-fill"></div></div>
            <small id="goalText"></small>
        </div>
        
        <div class="main-grid">
            <div class="section">
                <h3>🎯 משימות יומיות</h3>
                <div id="tasksList"></div>
                <div id="adminControls" style="display:none; margin-top:10px;">
                    <button onclick="addItem('tasks')" style="width:100%; border:1px dashed var(--p); padding:10px; border-radius:10px; background:none; color:var(--p); cursor:pointer;">+ הוסף משימה</button>
                </div>
            </div>
            
            <div class="section">
                <h3>💎 פרסים</h3>
                <div id="rewardsList"></div>
                <div id="adminControlsRewards" style="display:none; margin-top:10px;">
                    <button onclick="addItem('rewards')" style="width:100%; border:1px dashed #fdcb6e; padding:10px; border-radius:10px; background:none; color:#d3a000; cursor:pointer;">+ הוסף פרס</button>
                </div>
            </div>
        </div>

        <button class="btn-admin-toggle" onclick="state.isAdmin = !state.isAdmin; document.getElementById('adminControlsRewards').style.display = state.isAdmin?'block':'none'; render();">⚙️ ניהול מערכת (הוספה/מחיקה)</button>
        
        <button onclick="if(confirm('לאפס משימות יומיות?')){state.dailyDone={};save();}" style="width:100%; background:none; border:none; color:#bbb; margin-top:15px; cursor:pointer; font-size: 0.8rem;">איפוס יומי</button>
    </div>
</body>
</html>

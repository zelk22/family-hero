<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Family Hero 🌟 V38 - Fixed Smart Tasks</title>
   <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
   <style>
       :root {
           --primary: #6c5ce7; --success: #2ecc71; --special: #e84393;
           --coop: #00cec9; --loot: #f1c40f; --accent: #fdcb6e;
           --bg: #f0f2f5; --text: #2d3436; --danger: #ff7675;
           --card-bg: rgba(255, 255, 255, 0.9);
           --child-color: #6c5ce7;
           --streak-color: #ff9f43;
           --shadow: 0 8px 30px rgba(0,0,0,0.08);
       }
       @media (prefers-color-scheme: dark) {
           :root:not(.manual-light) { --bg: #121213; --text: #f5f6fa; --card-bg: #1e1e1f; --primary: #a29bfe; }
       }
       body.dark-mode { --bg: #121213; --text: #f5f6fa; --card-bg: #1e1e1f; --primary: #a29bfe; }
      
       .is-child-mode .admin-toggle-btn { display: none !important; }
       .is-child-mode .children-nav { display: none !important; }
       #adminWrapper { background: var(--card-bg) !important; color: var(--text) !important; padding: 20px; border-radius: 24px; margin: 20px 0; border: 2px solid var(--primary); box-shadow: var(--shadow); display: none; position: relative; z-index: 1001; backdrop-filter: blur(10px); }
      
       .accordion { background: rgba(0,0,0,0.05); color: var(--text); border: none; margin-bottom: 8px; cursor: pointer; padding: 18px; border-radius: 15px; width:100%; display:flex; justify-content:space-between; font-weight:bold; transition: 0.2s; }
       .accordion:hover { background: rgba(0,0,0,0.1); }
       .panel { background: rgba(255,255,255,0.05); border: 1px solid rgba(0,0,0,0.05); padding: 15px; border-radius: 0 0 15px 15px; margin-bottom: 10px; display: none; }
      
       body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; direction: rtl; transition: 0.3s; padding-bottom: 100px; }
       .container { max-width: 1000px; margin: 0 auto; }
      
       .admin-toggle-btn { position: fixed; bottom: 25px; left: 25px; width: 65px; height: 65px; background: var(--primary); color: white; border-radius: 50%; border: 4px solid white; font-size: 1.8rem; cursor: pointer; z-index: 9999; box-shadow: 0 10px 20px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
       .admin-toggle-btn:active { transform: scale(0.9); }
       .children-nav { display: flex; gap: 12px; overflow-x: auto; padding: 15px 5px; justify-content: center; -webkit-overflow-scrolling: touch; }
       .child-tab { background: var(--card-bg); padding: 12px 28px; border-radius: 50px; cursor: pointer; border: 2px solid transparent; font-weight: bold; white-space: nowrap; color: inherit; box-shadow: var(--shadow); transition: 0.3s; }
       .child-tab.active { border-color: var(--child-color); background: var(--child-color); color: white !important; transform: translateY(-5px); }
       .stats-card { background: linear-gradient(135deg, var(--child-color), #341f97); color: white; padding: 35px 25px; border-radius: 35px; margin: 15px 0; text-align: center; position: relative; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
       .treasure-box { font-size: 4.5rem; font-weight: 900; line-height: 1; margin: 10px 0; text-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; gap: 15px; }
       .treasure-icon { font-size: 3.8rem; filter: drop-shadow(0 4px 12px #ffd700); animation: treasureShine 2.5s infinite alternate; }
       @keyframes treasureShine { from { filter: drop-shadow(0 0 8px #ffd700); } to { filter: drop-shadow(0 0 22px #ffeb3b); } }
      
       .badge-container { display: flex; justify-content: center; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
       .hero-badge { background: rgba(255,255,255,0.15); padding: 6px 18px; border-radius: 25px; font-size: 0.95rem; font-weight: bold; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); }
       .streak-fire { color: var(--streak-color); text-shadow: 0 0 15px var(--streak-color); animation: flame 1.2s infinite alternate; }
       .wheel-btn { display: none; margin-top: 20px; background: var(--loot); color: #2d3436; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 900; cursor: pointer; animation: pulse 1.5s infinite; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(241, 196, 15, 0.4); }
       .category-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
       .cat-btn { background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1); padding: 8px 15px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: bold; color: var(--text); }
       .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
       .list-item { background: var(--card-bg); border-radius: 20px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-right: 8px solid transparent; transition: 0.3s; box-shadow: var(--shadow); }
       .list-item.completed { opacity: 0.7; border-right-color: var(--success); transform: scale(0.98); }
       .list-item.completed b { text-decoration: line-through; }
       .list-item.pending { border-right-color: #f1c40f; opacity: 0.9; }
       .list-item.pending b { color: #f1c40f; }
       .project-btn { width: 100%; margin-top: 12px; padding: 14px; background: var(--special); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 0 #c0392b; }
       .btn-v { width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--success); background: none; color: var(--success); cursor: pointer; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; position: relative; transition: 0.2s; }
       .btn-v.done { background: var(--success); color: white; border: none; }
       .btn-v.needs-camera::after { content: '📷'; font-size: 0.8rem; position: absolute; bottom: -8px; background: white; border-radius: 50%; padding: 3px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); color: black; }
       .btn-v.needs-approval::after { content: '👤'; font-size: 0.9rem; position: absolute; top: -8px; right: -8px; background: #f1c40f; color: #2d3436; border-radius: 50%; padding: 3px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
       .btn-v.has-quiz::after { content: '🧩'; font-size: 0.8rem; position: absolute; top: -8px; right: -8px; background: white; border-radius: 50%; padding: 3px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
       .manage-row { display: flex; gap: 8px; align-items: center; padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.05); flex-wrap: wrap; }
       .input-edit { background: rgba(255,255,255,0.9); color: #333; border: 1px solid #ddd; padding: 8px; border-radius: 8px; flex: 1; }
       .history-log { font-size: 0.85rem; max-height: 250px; overflow-y: auto; background: rgba(0,0,0,0.03); padding: 15px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.1); line-height: 1.6; }
       @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.08); filter: brightness(1.1);} 100% {transform: scale(1);} }
       @keyframes flame { from { transform: scale(1); opacity: 0.9; } to { transform: scale(1.2); opacity: 1; } }
      
       #challengeModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
       .modal-content { background: var(--card-bg); padding: 35px; border-radius: 30px; width: 85%; max-width: 420px; text-align: center; box-shadow: var(--shadow); border: 4px solid var(--child-color); animation: modalSlide 0.3s ease-out; position: relative; }
       @keyframes modalSlide { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
       .quiz-option { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; background: white; font-size: 1.1rem; }
       .quiz-option:hover { background: #f8f9fa; border-color: var(--child-color); transform: scale(1.02); }
       .modal-close { position: absolute; top: 15px; right: 20px; font-size: 2.5rem; cursor: pointer; color: #ff7675; font-weight: bold; }
       .parent-message { background: #fff3cd; border-radius: 20px; padding: 15px; margin: 15px 0 10px 0; border-right: 6px solid #f1c40f; font-weight: bold; text-align: center; }
       .smart-field { margin-bottom: 15px !important; }
       
       #avatarShopMain { display: none; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 25px 15px; background: var(--card-bg); border-radius: 24px; box-shadow: var(--shadow); margin-top: 12px; }
       .avatar-item { font-size: 3.6rem; cursor: pointer; padding: 18px 14px; border: 3px solid #ddd; border-radius: 22px; text-align: center; width: 138px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); background: white; box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
       .avatar-item:hover { transform: translateY(-8px) scale(1.09); border-color: var(--child-color); box-shadow: 0 14px 28px rgba(108, 92, 231, 0.3); }
       .avatar-item img { width: 72px; height: 72px; object-fit: contain; border-radius: 50%; }
       .avatar-item small { display: block; margin-top: 10px; font-size: 0.85rem; font-weight: bold; color: #2d3436; }
       
       .avatar-cat-tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
       .avatar-cat-btn { background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1); padding: 9px 22px; border-radius: 9999px; cursor: pointer; font-size: 0.92rem; font-weight: bold; }
       .avatar-cat-btn.active { background: var(--child-color); color: white; }
   </style>
</head>
<body id="mainBody" onclick="initAudio()">
<div id="challengeModal">
   <div class="modal-content" id="modalContent"></div>
</div>

<div class="container">
   <header style="text-align: center; padding: 20px 0;">
       <h1 style="margin: 0; font-size: 2.2rem; background: linear-gradient(to left, var(--primary), var(--special)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Family Hero 🌟</h1>
       <div id="dateDisplay" style="font-weight: bold; opacity: 0.6; margin-top: 5px;"></div>
   </header>
   <div id="childrenNav" class="children-nav"></div>
   <div id="coopArea"></div>
   <div class="stats-card" id="mainStatsCard">
       <span style="font-size: 1.2rem; font-weight: bold; letter-spacing: 1px;">💎 האוצר של <span id="activeNameDisplay">...</span></span>
       <div id="activePoints" class="treasure-box">
           <span class="treasure-icon">💰</span>
           <span id="pointsNumber">0</span>
       </div>
      
       <div class="badge-container">
           <div class="hero-badge" id="heroLevel">דרגה: מתחיל</div>
           <div class="hero-badge" id="heroStreak">🔥 רצף: 0</div>
       </div>
       <div style="width:90%; max-width:400px; height:12px; background:rgba(255,255,255,0.2); border-radius:10px; margin:20px auto 10px auto; overflow:hidden; border:1px solid rgba(255,255,255,0.3);">
           <div id="mainBar" style="height:100%; transition:1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); background:var(--accent); width: 0%;"></div>
       </div>
       <small id="nextGoalText" style="font-weight: 800; display: block; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.2);"></small>
      
       <button id="wheelBtn" class="wheel-btn" onclick="spinWheel()">🎡 בונוס גלגל המזל!</button>
       <button id="bonusWheelBtn" class="wheel-btn" onclick="spinBonusWheel()" style="display: none; background: linear-gradient(135deg, #00cec9, #00b4a8);">🎡 גלגל צ'ופר!</button>
       
       <div id="currentAvatarDisplay" style="margin-top:15px; text-align:center; font-size:2.8rem; display:none;"></div>
   </div>

   <div id="parentMessageBox" class="parent-message" style="display:none;"></div>

   <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px;">
       <div>
           <div style="display:flex; justify-content:space-between; align-items:center;">
               <h2 style="color: var(--primary);">📅 משימות</h2>
               <div class="category-tabs" id="catFilters">
                   <button class="cat-btn active" onclick="filterTasks('all', this)">הכל</button>
                   <button class="cat-btn" onclick="filterTasks('בוקר', this)">☀️ בוקר</button>
                   <button class="cat-btn" onclick="filterTasks('ערב', this)">🌙 ערב</button>
               </div>
           </div>
           <div id="tasksList"></div>
          
           <h3 style="color: var(--special); margin-top: 30px; display:flex; align-items:center; gap:10px;">🔥 פרויקטים <small style="font-size:0.7rem; background:var(--special); color:white; padding:2px 8px; border-radius:10px;">בונוס 100💎</small></h3>
           <div id="questsList"></div>
       </div>
       <div>
           <h2 style="color: var(--loot);">💎 חנות פרסים</h2>
           <div id="rewardsList"></div>
           
           <h3 onclick="toggleAvatarShop()" id="avatarHeader" style="color: var(--child-color); margin-top: 30px; display:flex; align-items:center; gap:10px; cursor:pointer; font-size:1.35rem;">
               🎨 חנות אווטרים 
               <small style="font-size:0.75rem; background:var(--child-color); color:white; padding:4px 12px; border-radius:9999px;">שדרג את הגיבור שלך!</small> 
               <span id="avatarToggleIcon" style="margin-left:auto; font-size:1.3rem;">▼</span>
           </h3>
           <div id="avatarShopMain" style="display:none;">
               <div class="avatar-cat-tabs" id="avatarCatFilters">
                   <button class="avatar-cat-btn active" onclick="filterAvatarCategory('all', this)">הכל</button>
                   <button class="avatar-cat-btn" onclick="filterAvatarCategory('regular', this)">מודרני</button>
                   <button class="avatar-cat-btn" onclick="filterAvatarCategory('biblical', this)">תנ״כי</button>
               </div>
               <div id="avatarShopContent" style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;"></div>
           </div>
       </div>
   </div>

   <div id="adminWrapper">
       <h2 style="text-align:center; margin-top:0;">🛠️ ניהול משפחתי</h2>
      
       <div style="display: flex; gap: 10px; margin-bottom: 15px;">
           <button onclick="copyChildLinks()" style="flex: 2; padding:14px; background:var(--coop); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer; box-shadow: 0 4px 10px rgba(0, 206, 201, 0.3);">🔗 העתק לינקים לילדים</button>
           <button onclick="toggleDarkMode()" id="darkModeBtn" style="flex: 1; padding:14px; background:#333; color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">🌙 מצב לילה</button>
       </div>

       <button class="accordion" onclick="toggleAcc(this)">➕ הוספת פריט רגיל <span>▼</span></button>
       <div class="panel">
           <div style="display:flex; gap:8px; flex-wrap:wrap; align-items: center;">
               <input type="text" id="addIcon" placeholder="😊" style="width:45px; text-align:center; padding:10px; border-radius:8px; border:1px solid #ccc;">
               <input type="text" id="addName" placeholder="שם המשימה/פרס..." style="flex:2; min-width:150px; padding: 10px; border-radius:8px; border:1px solid #ccc;">
               <input type="number" id="addVal" placeholder="שווי" style="width:65px; padding: 10px; border-radius:8px; border:1px solid #ccc;">
               <select id="addType" onchange="updateEmojiList();" style="padding: 10px; border-radius: 8px;">
                   <option value="task">משימה</option>
                   <option value="reward">פרס</option>
                   <option value="quest">פרויקט</option>
                   <option value="coop">אתגר משפחתי</option>
               </select>
               <select id="addCat" style="padding: 10px; border-radius: 8px;">
                   <option value="">ללא קטגוריה</option>
                   <option value="בוקר">☀️ בוקר</option>
                   <option value="צהריים">🥗 צהריים</option>
                   <option value="ערב">🌙 ערב</option>
               </select>
               <select id="addOwner" style="padding: 10px; border-radius: 8px;"></select>
               <label style="display:flex; align-items:center; gap:5px; font-weight:bold; cursor:pointer;">
                   <input type="checkbox" id="addNeedsApproval"> 👤 אימות הורה
               </label>
               <button onclick="addItem()" style="background:var(--success); color:white; border:none; padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">הוסף</button>
           </div>
           <div id="emojiPicker" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 5px; margin-top:15px; background:rgba(0,0,0,0.05); padding:10px; border-radius:10px;"></div>
       </div>

       <button class="accordion" onclick="toggleAcc(this)">➕ הוספת משימה חכמה <span>▼</span></button>
       <div class="panel">
           <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
               <input type="text" id="smartName" placeholder="שם המשימה החכמה" style="flex:2; min-width:200px; padding:10px; border-radius:8px; border:1px solid #ccc;">
               <input type="number" id="smartVal" placeholder="שווי" value="20" style="width:70px; padding:10px; border-radius:8px; border:1px solid #ccc;">
               <select id="smartVType" onchange="toggleSmartFields2()" style="padding:10px; border-radius:8px;">
                   <option value="math">🧮 תרגיל כפל</option>
                   <option value="quiz">📝 שאלה אמריקאית</option>
                   <option value="open">📝 תשובה פתוחה</option>
                   <option value="code">🔑 קוד סודי</option>
               </select>
               <select id="smartOwner" style="padding:10px; border-radius:8px;"></select>
               <label style="display:flex; align-items:center; gap:5px; font-weight:bold; cursor:pointer;">
                   <input type="checkbox" id="smartNeedsApproval"> 👤 אימות הורה
               </label>
               <button onclick="addSmartTask()" style="background:var(--success); color:white; border:none; padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:bold;">הוסף משימה חכמה</button>
           </div>
           <div id="smartFields2" style="margin-top:15px; padding:15px; background:rgba(0,0,0,0.05); border-radius:12px;">
               <div class="smart-field">
                   <label>השאלה / תרגיל</label>
                   <input type="text" id="smartQuestion" placeholder="למשל: כמה זה 7×8?" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; margin-top:5px;">
               </div>
               <div class="smart-field">
                   <label>התשובה הנכונה</label>
                   <input type="text" id="smartAnswer" placeholder="56" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; margin-top:5px;">
               </div>
               <div id="smartOptionsGroup" class="smart-field" style="display:none;">
                   <label>תשובות מבלבלות (מופרדות בפסיק)</label>
                   <input type="text" id="smartOptions" placeholder="42,48,64" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; margin-top:5px;">
               </div>
           </div>
       </div>

       <button class="accordion" onclick="toggleAcc(this)">👶 מצב נקודות ודרגות <span>▼</span></button>
       <div class="panel" id="manageChildren"></div>
      
       <button class="accordion" onclick="toggleAcc(this)">📝 עריכת תוכן קיים <span>▼</span></button>
       <div class="panel">
           <h4>📋 משימות</h4><div id="manageTasks"></div><hr>
           <h4>🎁 פרסים</h4><div id="manageRewards"></div><hr>
           <h4>🔥 פרויקטים</h4><div id="manageQuests"></div><hr>
           <h4>🤝 אתגרים משפחתיים</h4><div id="manageCoops"></div>
       </div>
      
       <button class="accordion" onclick="toggleAcc(this)">🎨 ניהול אווטרים (תמונות + שיוך לילדים) <span>▼</span></button>
       <div class="panel" id="manageAvatarsPanel"></div>

       <button class="accordion" onclick="toggleAcc(this)">📸 גלריית הוכחות <span>▼</span></button>
       <div class="panel">
           <button onclick="clearAllProofs()" style="background: var(--danger); color: white; border: none; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; cursor:pointer; font-weight:bold;">🗑️ מחק את כל התמונות</button>
           <div id="proofViewer" style="display:flex; gap:12px; overflow-x:auto; padding: 10px 0; min-height:100px;"></div>
       </div>
       <button class="accordion" onclick="toggleAcc(this)">📜 יומן פעילות והיסטוריה <span>▼</span></button>
       <div class="panel">
           <h4 style="margin-top:0;">🛒 רכישות אחרונות:</h4>
           <div id="redemptionLog" class="history-log" style="margin-bottom:15px; border-right:4px solid var(--loot);">אין רכישות עדיין.</div>
           <h4>🚀 פעילות כללית:</h4>
           <div id="activityLog" class="history-log">אין פעילות מתועדת.</div>
           <button onclick="clearLogsOnly()" style="width:100%; margin-top:15px; padding:12px; background:#ff7675; color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">🗑️ מחק יומן פעילות (בלי איפוס נקודות)</button>
       </div>

       <button class="accordion" onclick="toggleAcc(this)">⏳ משימות ממתינות לאישור הורה <span>▼</span></button>
       <div class="panel" id="pendingApprovalsPanel"></div>

       <button class="accordion" onclick="toggleAcc(this)">📨 הודעות עידוד לילדים <span>▼</span></button>

           <div style="display:flex; gap:8px; flex-wrap:wrap;">

   function playTone(f, type, dur, vol, slide=0, delay=0) {
       if(!audioCtx) return;
       setTimeout(() => {
           const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
           o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
           if(slide) o.frequency.exponentialRampToValueAtTime(slide, audioCtx.currentTime + dur);
           g.gain.setValueAtTime(vol, audioCtx.currentTime);
           g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);
           o.connect(g); g.connect(audioCtx.destination);
           o.start(); o.stop(audioCtx.currentTime + dur);
       }, delay);
   }

   function buyReward(rewardId) {
       const reward = state.rewards.find(r => r.id === rewardId);
       if (!reward) return alert("פרס לא נמצא");
       
       const child = state.children[state.activeChild];
       if (child.pts >= reward.val) {
           if (confirm(`אתה עומד לפדות את ${reward.name} ב-${reward.val} 💎 – אתה בטוח?`)) {
               child.pts -= reward.val;
               addLog(`${child.name} פדה פרס: ${reward.name}`);
               if(!state.redemptions) state.redemptions = [];
               state.redemptions.unshift({date: new Date().toLocaleDateString('he-IL'), childName: child.name, rewardName: reward.name});
               sounds.reward();
               confetti({ particleCount: 120, spread: 70 });
               save();
               render();
               alert(`🎉 פדית את ${reward.name} בהצלחה!`);
           }
       } else {
           alert(`חסרות לך עוד ${reward.val - child.pts} נקודות...`);
       }
   }
  
   function handleTaskClick(id) {
       const child = state.children[state.activeChild];
       const done = state.dailyDone[child.id] || [];
       if(done.includes(id)) {
           if(!confirm("לבטל את המשימה? (הנקודות ירדו)")) return;
           const task = state.tasks.find(t => t.id === id);
           if(!task) return;
           state.dailyDone[child.id] = done.filter(x => x !== id);
           state.allTasksDoneToday[child.id] = false;
           child.pts = Math.max(0, child.pts - task.val);
           child.totalPts = Math.max(0, child.totalPts - task.val);
           save(); render(); return;
       }
      
       const task = state.tasks.find(t => t.id === id);
       if(!task) return;
      
       if (task.needsParentApproval) {
           if (!state.pendingApprovals) state.pendingApprovals = [];
           state.pendingApprovals.push({id: Date.now(), taskId: id, childId: child.id, childName: child.name, taskName: task.name, val: task.val, timestamp: new Date().toLocaleString('he-IL')});
           addLog(`⏳ ${child.name} ביקש אישור על "${task.name}"`);
           save(); render();
           return;
       }
      
       if (task.vType && task.vType !== 'none') {
           openChallenge(task);
       } else if (task.needsProof) {
           pendingTaskId = {id, val: task.val, name: task.name};
           document.getElementById('cameraInput').click();
       } else {
           completeTask(id, task.val, task.name);
       }
   }
  
   function completeTask(id, val, taskName) {
       const child = state.children[state.activeChild];
       if(!state.dailyDone[child.id]) state.dailyDone[child.id]=[];
       
       const oldRank = getRank(child.totalPts || 0).title;
       
       state.dailyDone[child.id].push(id);
       child.pts += val;
       child.totalPts += val;
       
       if(getRank(child.totalPts).title !== oldRank) {
           sounds.levelUp();
           alert(`כל הכבוד! עלית לדרגת ${getRank(child.totalPts).title}!`);
       }
       addLog(`${child.name} סיים: ${taskName} (+${val})`);
       sounds.task();
       confetti({ particleCount:100, spread:70, origin:{y:0.6}, colors: [childColors[state.activeChild % childColors.length], '#ffffff'] });
       save(); render();
       setTimeout(checkAllTasksDone, 300);
   }
  
   function checkAllTasksDone() {
       const child = state.children[state.activeChild];
       const done = state.dailyDone[child.id] || [];
       const tasksToday = (state.tasks||[]).filter(t => !t.owner || t.owner === 'all' || t.owner == child.id);
       
       if(tasksToday.length > 0 && done.length >= tasksToday.length && !(state.allTasksDoneToday[child.id] || false)) {
           state.allTasksDoneToday[child.id] = true;
           
           const todayStr = new Date().toDateString();
           const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
           const yesterdayStr = yesterday.toDateString();
           
           if (child.lastFullDate === yesterdayStr) {
               child.streak = (child.streak || 0) + 1;
           } else {
               child.streak = 1;
           }
           child.lastFullDate = todayStr;
           
           applauseSound();
           confetti({particleCount:250, spread:120, origin:{y:0.6}});
           alert("🎉 ברכות! סיימת את כל המשימות להיום!");
           addLog(`🎉 ${child.name} סיים את כל המשימות להיום!`);
           save();
           render();
       }
   }

           if(!state.proofs) state.proofs={};
           state.proofs[Date.now()] = { img: e.target.result, by: state.children[state.activeChild].name };
           const p = pendingTaskId;
           if(p) completeTask(p.id, p.val, p.name);
           pendingTaskId=null;
       };
       reader.readAsDataURL(file);
   }
  
   function clearAllProofs() { if(confirm('למחוק את כל הזיכרונות והתמונות?')){state.proofs={};save();render();}}
  
   function approvePending(id) {
       const p = state.pendingApprovals.find(x => x.id === id);
       if(!p) return;
       state.pendingApprovals = state.pendingApprovals.filter(x => x.id !== id);
       const child = state.children.find(c => c.id === p.childId);
       if(child) completeTask(p.taskId, p.val, p.taskName);
       save(); render();
   }
  
   function rejectPending(id) {
       state.pendingApprovals = state.pendingApprovals.filter(x => x.id !== id);
       save(); render();
   }
  
   function advQuest(id, name) {
       const q = state.quests.find(x => x.id === id);
       if(!q) return;
       if (q.current >= q.steps) {
           alert(`הפרוייקט "${name}" כבר הושלם!`);
           return;
       }
       q.current = (q.current || 0) + 1;
       if(q.current >= q.steps) {
           const child = state.children[state.activeChild];
           child.pts += 100;
           child.totalPts += 100;
           sounds.questFinish();
           confetti({particleCount:200});
           alert(`🎉 ${name} הושלם! +100 נקודות`);
       }
       save(); render();
   }
  
   render();
</script>
</body>
</html>

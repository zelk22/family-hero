<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Family Hero 🌟 V16.1</title>
   <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
   <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
   <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
   
   <style>
       :root { --primary: #6c5ce7; --success: #2ecc71; --bg: #f8f9fa; --text: #2d3436; --card: #fff; }
       
       /* מצב לילה אוטומטי לערכת נושא "ללא" */
       body.theme-none.dark-mode { --bg: #2d3436; --text: #dfe6e9; --card: #353b48; }

       /* ערכות נושא עם שיפור קריאות */
       body.theme-space { --bg: #0b0d17; --text: #fff; --primary: #4834d4; --card: rgba(22, 29, 51, 0.9); --accent: #00d2ff; background: radial-gradient(circle, #1b2735, #090a0f); }
       body.theme-gaming { --bg: #000; --text: #0cf; --primary: #1a1a1a; --card: #111; --accent: #f0f; text-shadow: 0 0 5px #0cf; }
       body.theme-candy { --bg: #ffafcc; --text: #5c4d7d; --primary: #ff5d8f; --card: rgba(255,255,255,0.9); --accent: #cdb4db; }
       body.theme-hacker { --bg: #000; --text: #0f0; --primary: #020; --card: #000; --accent: #0f0; font-family: monospace; }
       /* (שאר ערכות הנושא יוטמעו ב-JS להפחתת עומס כאן) */

       body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; direction: rtl; transition: 0.5s; }
       .container { max-width: 1000px; margin: 0 auto; }
       
       .child-tab { background: var(--card); padding: 10px 20px; border-radius: 15px; cursor: pointer; border: 2px solid #ddd; display: inline-block; margin: 5px; color: var(--text); }
       .child-tab.active { border-color: var(--primary); background: var(--primary); color: white !important; font-weight: bold; }

       .stats-card { background: var(--card); padding: 25px; border-radius: 25px; text-align: center; border: 2px solid var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin: 15px 0; }
       .treasure-box { font-size: 4rem; font-weight: 800; }

       .list-item { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
       .list-item.completed b { text-decoration: line-through; opacity: 0.6; }
       
       .btn-v { width: 45px; height: 45px; border-radius: 10px; border: 2px solid var(--success); background: none; color: var(--success); cursor: pointer; font-size: 1.2rem; }
       .btn-v.done { background: var(--success); color: white; }

       .btn-cam { background: #eee; border: none; padding: 8px; border-radius: 8px; cursor: pointer; margin-right: 10px; font-size: 1.2rem; }

       /* פאנל ניהול - תמיד לבן וברור */
       #adminWrapper { background: #ffffff !important; color: #333 !important; padding: 20px; border-radius: 20px; margin-top: 40px; border: 4px solid #333; clear: both; }
       #adminWrapper * { color: #333 !important; text-shadow: none !important; }
       .accordion { background: #f1f2f6; border: none; padding: 12px; width: 100%; text-align: right; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 5px; }
       .panel { display: none; padding: 15px; background: #fff; border: 1px solid #ddd; }
       
       .proof-img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; border: 2px solid #ccc; }
   </style>
</head>
<body id="mainBody">

<div class="container">
   <header style="text-align: center;">
       <h1 id="appTitle">Family Hero</h1>
       <div id="dateDisplay"></div>
   </header>

   <div id="childrenNav" style="text-align:center; padding: 10px 0;"></div>

   <div class="stats-card">
       <div style="font-size: 1.1rem;"><span id="activeNameDisplay"></span> אסף עד כה:</div>
       <div id="activePoints" class="treasure-box">0</div>
       <div id="nextGoalText" style="font-weight: bold; margin-bottom: 8px;"></div>
       <div style="width:100%; height:12px; background:#eee; border-radius:10px; overflow:hidden;">
           <div id="mainBar" style="height:100%; transition:1s; background:var(--primary); width: 0%;"></div>
       </div>
       <button id="wheelBtn" style="display:none; margin-top:15px; padding:10px; background:gold; border:none; border-radius:10px; font-weight:bold; cursor:pointer;" onclick="spinWheel()">🎡 גלגל המזל היומי!</button>
   </div>

   <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
       <div>
           <h3>✅ משימות</h3>
           <div id="tasksList"></div>
           <h3>🚀 פרויקטים</h3>
           <div id="questsList"></div>
       </div>
       <div>
           <h3>🎁 פרסים</h3>
           <div id="rewardsList"></div>
       </div>
   </div>

   <!-- פאנל ניהול -->
   <div id="adminWrapper" style="display:none;">
       <h2 style="text-align:center;">🛠️ ניהול הורים - V16.1</h2>
       
       <button class="accordion" onclick="toggleAcc(this)">👶 הגדרות ילדים וערכות נושא <span>▼</span></button>
       <div class="panel" id="manageChildren"></div>

       <button class="accordion" onclick="toggleAcc(this)">📝 עריכת תוכן (משימות/פרסים/פרויקטים) <span>▼</span></button>
       <div class="panel">
           <h4>משימות</h4><div id="adminTasks"></div>
           <hr><h4>פרסים</h4><div id="adminRewards"></div>
           <hr><h4>פרויקטים</h4><div id="adminQuests"></div>
       </div>

       <button class="accordion" onclick="toggleAcc(this)">📸 צילומי הוכחה מהילדים <span>▼</span></button>
       <div class="panel">
           <div id="proofViewer" style="display:flex; gap:10px; flex-wrap:wrap;"></div>
       </div>

       <button class="accordion" onclick="toggleAcc(this)">➕ הוספת פריט חדש <span>▼</span></button>
       <div class="panel">
           <select id="addType"><option value="task">משימה</option><option value="reward">פרס</option><option value="quest">פרויקט</option></select>
           <input type="text" id="addName" placeholder="שם...">
           <input type="number" id="addVal" placeholder="ערך">
           <button onclick="addItem()">הוסף</button>
       </div>

       <button onclick="if(confirm('לאפס יום?')){state.dailyDone={};state.proofs={};state.wheelDone={};save();render();}" style="width:100%; margin-top:20px; padding:12px; background:#ff7675; color:white; border:none; border-radius:10px; font-weight:bold;">⏰ איפוס יומי</button>
   </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;" onchange="handleImageUpload(event)">

<script>
   const firebaseConfig = {
       apiKey: "AIzaSyD-JrKHwexfIk-fPPvpMcxGSvXwYp9OUkw",
       authDomain: "family-hero-3a3fd.firebaseapp.com",
       projectId: "family-hero-3a3fd",
       storageBucket: "family-hero-3a3fd.firebasestorage.app",
       messagingSenderId: "882400699018",
       appId: "1:882400699018:web:08af27dde50e387ea10373"
   };
   firebase.initializeApp(firebaseConfig);
   const db = firebase.firestore();
   const docRef = db.collection("data").doc("v875_main_state");

   const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
   let state = { activeChild:0, children:[], tasks:[], rewards:[], quests:[], dailyDone:{}, proofs:{}, wheelDone:{} };
   let isInitialLoad = true;
   let currentTaskId = null;

   docRef.onSnapshot(doc => {
       if(doc.exists) state = doc.data();
       isInitialLoad = false;
       render();
   });

   function save() { if(!isInitialLoad) docRef.set(state); }

   const themes = {
       none: "ללא (בסיסי + מצב לילה) 🏠", space: "חלל 🚀", jungle: "ג'ונגל 🦁", 
       candy: "ממתקים 🍭", hero: "גיבורים 🦸‍♂️", gaming: "גיימינג 🎮",
       hacker: "האקר 💻", sports: "ספורט ⚽", social: "טיקטוק 📱", minimal: "מינימל 🧊"
   };

   function render() {
       if(!state.children || !state.children[state.activeChild]) return;
       const child = state.children[state.activeChild];
       const done = state.dailyDone[child.id] || [];
       
       // עיצוב וערכת נושא
       document.body.className = `theme-${child.theme || 'none'}`;
       if(child.theme === 'none' || !child.theme) {
           const hour = new Date().getHours();
           if(hour >= 19 || hour < 7) document.body.classList.add('dark-mode');
       }
       
       document.getElementById('appTitle').innerText = themes[child.theme] || "Family Hero";
       document.getElementById('activePoints').innerText = child.pts;
       document.getElementById('activeNameDisplay').innerText = child.name;
       document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});

       if(isAdmin) {
           document.getElementById('adminWrapper').style.display = 'block';
           document.getElementById('childrenNav').innerHTML = state.children.map((c,i)=>`
               <div class="child-tab ${i==state.activeChild?'active':''}" onclick="state.activeChild=${i};render();">${c.name}</div>`).join('');
           renderAdmin();
       }

       // רשימות
       document.getElementById('tasksList').innerHTML = state.tasks.map(t => `
           <div class="list-item ${done.includes(t.id)?'completed':''}">
               <div style="display:flex; align-items:center;">
                   <button class="btn-cam" onclick="openCam(${t.id})">📸</button>
                   <b>${t.name} <small>(+${t.val})</small></b>
               </div>
               <button class="btn-v ${done.includes(t.id)?'done':''}" onclick="handleTask(${t.id},${t.val})">V</button>
           </div>`).join('');

       document.getElementById('rewardsList').innerHTML = state.rewards.map(r => `
           <div class="list-item">
               <b>${r.name} <br><small>${r.val} 💎</small></b>
               <button onclick="buy(${r.val})" style="background:var(--primary); color:white; border:none; padding:8px; border-radius:10px;">פדה</button>
           </div>`).join('');
   }

   function renderAdmin() {
       // הגדרות ילדים
       document.getElementById('manageChildren').innerHTML = state.children.map((c,i) => `
           <div style="margin-bottom:10px; border-bottom:1px solid #eee; padding:5px;">
               <input value="${c.name}" onchange="state.children[${i}].name=this.value;save()" style="width:80px;">
               <select onchange="state.children[${i}].theme=this.value;save();render();">
                   ${Object.entries(themes).map(([k,v])=>`<option value="${k}" ${c.theme==k?'selected':''}>${v}</option>`).join('')}
               </select>
               <input type="number" value="${c.pts}" onchange="state.children[${i}].pts=parseInt(this.value);save()" style="width:60px;">
           </div>`).join('');

       // עריכת תוכן
       document.getElementById('adminTasks').innerHTML = state.tasks.map((t,i)=>`
           <div style="display:flex; gap:5px; margin-bottom:5px;">
               <input value="${t.name}" onchange="state.tasks[${i}].name=this.value;save()" style="flex:1;">
               <input type="number" value="${t.val}" onchange="state.tasks[${i}].val=parseInt(this.value);save()" style="width:50px;">
               <button onclick="state.tasks.splice(${i},1);save();render()">🗑️</button>
           </div>`).join('');

       // צילומים
       document.getElementById('proofViewer').innerHTML = Object.entries(state.proofs || {}).map(([key, img]) => `
           <div style="text-align:center;">
               <img src="${img}" class="proof-img" onclick="alert('צילום משימה')"><br>
               <button onclick="deleteProof('${key}')" style="font-size:0.7rem; color:red;">מחק 🗑️</button>
           </div>`).join('');
   }

   function handleTask(id, val) {
       const child = state.children[state.activeChild];
       if(!state.dailyDone[child.id]) state.dailyDone[child.id]=[];
       const done = state.dailyDone[child.id];
       if(done.includes(id)) {
           done.splice(done.indexOf(id),1); child.pts -= val;
       } else {
           done.push(id); child.pts += val; confetti();
       }
       save(); render();
   }

   function openCam(id) { currentTaskId = id; document.getElementById('cameraInput').click(); }

   function handleImageUpload(event) {
       const file = event.target.files[0];
       if(!file) return;
       const reader = new FileReader();
       reader.onload = e => {
           if(!state.proofs) state.proofs = {};
           const key = `${state.children[state.activeChild].id}_${currentTaskId}`;
           state.proofs[key] = e.target.result;
           alert("הצילום נשלח בהצלחה!");
           save(); render();
       };
       reader.readAsDataURL(file);
   }

   function deleteProof(key) { if(confirm("למחוק את הצילום?")){ delete state.proofs[key]; save(); render(); }}

   function addItem() {
       const type = document.getElementById('addType').value, name = document.getElementById('addName').value, val = parseInt(document.getElementById('addVal').value)||0;
       if(!name) return;
       if(type=='task') state.tasks.push({id:Date.now(), name, val});
       else if(type=='reward') state.rewards.push({id:Date.now(), name, val});
       else if(type=='quest') state.quests.push({id:Date.now(), name, steps:val, current:0});
       save(); render();
   }

   function toggleAcc(el) { const p = el.nextElementSibling; p.style.display = p.style.display==='block'?'none':'block'; }
   function buy(v) { const c = state.children[state.activeChild]; if(c.pts>=v && confirm("לפדות?")){ c.pts-=v; save(); render(); confetti(); }}
</script>
</body>
</html>
